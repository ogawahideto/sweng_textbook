<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#E53935"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#388E3C"/>
    </marker>
  </defs>
  <rect width="520" height="320" fill="#FAFAFA" rx="8"/>

  <!-- ===== コントローラーボックス ===== -->
  <rect x="60" y="20" width="400" height="82" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="10"/>
  <text x="260" y="44" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#1565C0">コントローラー</text>
  <text x="260" y="63" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#444">QuestForge APIサーバー</text>
  <text x="260" y="80" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#888">「クエストを完了させろ」と指令する</text>

  <!-- ===== 制御指令（下向き赤矢印） ===== -->
  <line x1="175" y1="102" x2="175" y2="208" stroke="#E53935" stroke-width="2.5" marker-end="url(#arr-red)"/>

  <!-- 制御指令ラベル（矢印の左側） -->
  <text x="162" y="148" text-anchor="end" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="#C62828">制御指令</text>
  <text x="162" y="164" text-anchor="end" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888">「経験値を加算し</text>
  <text x="162" y="177" text-anchor="end" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888">DBに保存する」</text>

  <!-- ===== フィードバック（上向き緑矢印） ===== -->
  <line x1="345" y1="210" x2="345" y2="104" stroke="#388E3C" stroke-width="2.5" marker-end="url(#arr-green)"/>

  <!-- フィードバックラベル（矢印の右側） -->
  <text x="358" y="148" text-anchor="start" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="#2E7D32">フィードバック</text>
  <text x="358" y="164" text-anchor="start" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888">「保存完了」</text>
  <text x="358" y="177" text-anchor="start" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888">「エラー発生」</text>

  <!-- ===== 制御されるプロセスボックス ===== -->
  <rect x="60" y="210" width="400" height="82" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="10"/>
  <text x="260" y="234" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#1B5E20">制御されるプロセス</text>
  <text x="260" y="253" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#444">DBサービス / 外部API</text>
  <text x="260" y="270" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#888">指令を受けて処理を実行する</text>

  <!-- ===== 危険な制御行動の注記 ===== -->
  <rect x="60" y="304" width="400" height="10" fill="none"/>
  <text x="260" y="312" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#AAA">事故はこのループで「想定の齟齬」が生まれたとき起きる——①指令なし ②誤指令 ③タイミングのズレ ④停止しない</text>
</svg>
