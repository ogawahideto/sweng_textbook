<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .circle-blue { fill: #E3F2FD; stroke: #1E88E5; stroke-width: 3; }
      .circle-green { fill: #E8F5E9; stroke: #43A047; stroke-width: 3; }
      .circle-user { fill: #FFF3E0; stroke: #FB8C00; stroke-width: 2; }
      .router { fill: #333; }
      .line-active { stroke: #1E88E5; stroke-width: 4; marker-end: url(#arrow-blue); }
      .line-standby { stroke: #CCC; stroke-width: 2; stroke-dasharray: 4; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #666; text-anchor: middle; }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#1E88E5" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <rect x="0" y="0" width="500" height="400" class="bg"/>
  <title>Blue/Green デプロイメント</title>

  <!-- ユーザー -->
  <circle cx="250" cy="50" r="30" class="circle-user" />
  <text x="250" y="55" class="text-main">ユーザー</text>

  <!-- ルーター/ロードバランサー -->
  <rect x="200" y="120" width="100" height="40" rx="5" class="router" />
  <text x="250" y="145" class="text-main" fill="white">Router</text>

  <!-- Blue 環境 (Active) -->
  <circle cx="150" cy="280" r="60" class="circle-blue" />
  <text x="150" y="275" class="text-main">Blue (v1.0)</text>
  <text x="150" y="295" class="text-sub">本番稼働中</text>

  <!-- Green 環境 (Standby/New) -->
  <circle cx="350" cy="280" r="60" class="circle-green" />
  <text x="350" y="275" class="text-main">Green (v1.1)</text>
  <text x="350" y="295" class="text-sub">待機 / 検証中</text>

  <!-- 接続線 -->
  <line x1="250" y1="80" x2="250" y2="120" stroke="#333" stroke-width="2" />
  
  <!-- Active への接続 -->
  <path d="M 230,160 Q 200,200 170,230" class="line-active" />
  
  <!-- Standby への接続 -->
  <path d="M 270,160 Q 300,200 330,230" class="line-standby" />

  <!-- 切り替えの矢印 -->
  <path d="M 220,180 Q 250,210 280,180" stroke="#FB8C00" stroke-width="2" fill="none" marker-end: url(#arrow-orange) />
  <text x="250" y="220" class="text-main" fill="#FB8C00">Switch!</text>

</svg>