<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="760" height="540">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-dash" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
  <rect width="760" height="540" fill="#FAFAFA" rx="8"/>

  <!-- システム境界 -->
  <rect x="115" y="20" width="510" height="500" fill="#F0F4FF" stroke="#888" stroke-width="2" stroke-dasharray="8,4" rx="8"/>
  <text x="370" y="46" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="15" font-weight="bold" fill="#333">QuestForge</text>

  <!-- ===== ユースケース ===== -->
  <!-- 1. クエストを作成する -->
  <ellipse cx="310" cy="92" rx="115" ry="26" fill="#E3F2FD" stroke="#4A90D9" stroke-width="2"/>
  <text x="310" y="97" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">クエストを作成する</text>

  <!-- 2. 難易度を設定する（include） -->
  <ellipse cx="310" cy="178" rx="115" ry="26" fill="#E3F2FD" stroke="#4A90D9" stroke-width="2"/>
  <text x="310" y="183" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">難易度を設定する</text>

  <!-- include arrow: 1→2 -->
  <line x1="310" y1="118" x2="310" y2="152" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="318" y="138" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#777">«include»</text>

  <!-- 3. クエストを完了する -->
  <ellipse cx="310" cy="290" rx="115" ry="26" fill="#E3F2FD" stroke="#4A90D9" stroke-width="2"/>
  <text x="310" y="295" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">クエストを完了する</text>

  <!-- 4. 経験値を獲得する（include） -->
  <ellipse cx="310" cy="376" rx="115" ry="26" fill="#E3F2FD" stroke="#4A90D9" stroke-width="2"/>
  <text x="310" y="381" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">経験値を獲得する</text>

  <!-- include arrow: 3→4 -->
  <line x1="310" y1="316" x2="310" y2="350" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="318" y="336" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#777">«include»</text>

  <!-- 5. レベルアップする（extend） -->
  <ellipse cx="310" cy="462" rx="115" ry="26" fill="#E3F2FD" stroke="#4A90D9" stroke-width="2"/>
  <text x="310" y="467" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">レベルアップする</text>

  <!-- extend arrow: 4→5 -->
  <line x1="310" y1="402" x2="310" y2="436" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="318" y="422" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#777">«extend»</text>

  <!-- 6. 進捗を確認する（ギルドマスター） -->
  <ellipse cx="530" cy="462" rx="100" ry="26" fill="#E3F2FD" stroke="#4A90D9" stroke-width="2"/>
  <text x="530" y="467" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">進捗を確認する</text>

  <!-- ===== アクター：勇者（左） ===== -->
  <circle cx="55" cy="248" r="14" fill="none" stroke="#4A90D9" stroke-width="2"/>
  <line x1="55" y1="262" x2="55" y2="298" stroke="#4A90D9" stroke-width="2"/>
  <line x1="32" y1="277" x2="78" y2="277" stroke="#4A90D9" stroke-width="2"/>
  <line x1="55" y1="298" x2="36" y2="324" stroke="#4A90D9" stroke-width="2"/>
  <line x1="55" y1="298" x2="74" y2="324" stroke="#4A90D9" stroke-width="2"/>
  <text x="55" y="343" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#4A90D9">勇者</text>

  <!-- 勇者→ユースケース接続線 -->
  <line x1="82" y1="258" x2="195" y2="96" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="82" y1="277" x2="195" y2="292" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="82" y1="292" x2="195" y2="376" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== アクター：ギルドマスター（右） ===== -->
  <circle cx="705" cy="418" r="14" fill="none" stroke="#7CB342" stroke-width="2"/>
  <line x1="705" y1="432" x2="705" y2="468" stroke="#7CB342" stroke-width="2"/>
  <line x1="682" y1="447" x2="728" y2="447" stroke="#7CB342" stroke-width="2"/>
  <line x1="705" y1="468" x2="686" y2="494" stroke="#7CB342" stroke-width="2"/>
  <line x1="705" y1="468" x2="724" y2="494" stroke="#7CB342" stroke-width="2"/>
  <text x="705" y="512" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" font-weight="bold" fill="#7CB342">ギルドマスター</text>

  <!-- ギルドマスター→進捗を確認する -->
  <line x1="678" y1="445" x2="630" y2="462" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
