<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .class-box { fill: #FFF; stroke: #333; stroke-width: 2; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-attr { font-family: 'monospace'; font-size: 12px; fill: #333; }
      .relation { stroke: #333; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="300" class="bg"/>

  <!-- Hero -->
  <rect x="50" y="50" width="120" height="100" class="class-box" />
  <line x1="50" y1="75" x2="170" y2="75" stroke="#333" />
  <text x="110" y="68" class="text-title">Hero</text>
  <text x="60" y="95" class="text-attr">+name: String</text>
  <text x="60" y="115" class="text-attr">+level: int</text>
  <line x1="50" y1="125" x2="170" y2="125" stroke="#333" />
  <text x="60" y="140" class="text-attr">+gainExp(val)</text>

  <!-- Quest -->
  <rect x="330" y="50" width="120" height="100" class="class-box" />
  <line x1="330" y1="75" x2="450" y2="75" stroke="#333" />
  <text x="390" y="68" class="text-title">Quest</text>
  <text x="340" y="95" class="text-attr">+title: String</text>
  <text x="340" y="115" class="text-attr">+status: String</text>
  <line x1="330" y1="125" x2="450" y2="125" stroke="#333" />
  <text x="340" y="140" class="text-attr">+complete()</text>

  <!-- Reward -->
  <rect x="330" y="200" width="120" height="80" class="class-box" />
  <line x1="330" y1="225" x2="450" y2="225" stroke="#333" />
  <text x="390" y="218" class="text-title">Reward</text>
  <text x="340" y="245" class="text-attr">+exp: int</text>
  <text x="340" y="265" class="text-attr">+item: String</text>

  <!-- Relations -->
  <line x1="170" y1="100" x2="330" y2="100" class="relation" />
  <text x="250" y="90" class="text-title" font-size="10">挑戦する</text>
  <text x="180" y="115" font-size="10">1</text>
  <text x="315" y="115" font-size="10">*</text>

  <line x1="390" y1="150" x2="390" y2="200" class="relation" />
  <text x="410" y="180" class="text-title" font-size="10">与える</text>
  <text x="395" y="165" font-size="10">1</text>
  <text x="395" y="195" font-size="10">1</text>
</svg>