<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 575" width="560" height="575">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="560" height="575" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="280" y="28" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="14" font-weight="bold" fill="#333">STPAの4ステップ（QuestForge例）</text>

  <!-- ===== Step 1: Loss ===== -->
  <rect x="30" y="42" width="500" height="100" fill="#FFEBEE" stroke="#E53935" stroke-width="2" rx="10"/>
  <!-- Step badge -->
  <rect x="30" y="42" width="120" height="26" fill="#E53935" rx="6"/>
  <text x="90" y="59" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="#FFF">Step 1: 損失を定義</text>
  <text x="200" y="60" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#C62828">Loss — システムが避けるべき最悪の結果</text>

  <text x="50" y="84" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">L1: 冒険者のデータが消失または破損する</text>
  <text x="50" y="103" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">L2: 誤った経験値・ランクで冒険が続く</text>
  <text x="50" y="122" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">L3: 不正アクセスによる個人情報の漏洩</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="142" x2="280" y2="173" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="292" y="161" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888">「何が失われるか」を定義</text>

  <!-- ===== Step 2: Hazard ===== -->
  <rect x="30" y="176" width="500" height="82" fill="#FFF3E0" stroke="#F57C00" stroke-width="2" rx="10"/>
  <rect x="30" y="176" width="120" height="26" fill="#F57C00" rx="6"/>
  <text x="90" y="193" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="#FFF">Step 2: ハザード特定</text>
  <text x="200" y="194" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#E65100">Hazard — 損失に直結しうるシステムの状態</text>

  <text x="50" y="218" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">H1: 経験値計算の結果がDBに反映されていない状態</text>
  <text x="50" y="238" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">H2: 未認証リクエストがAPIに到達できる状態</text>

  <!-- Arrow 2→3 -->
  <line x1="280" y1="258" x2="280" y2="289" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="292" y="277" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888">「どんな状態が危険か」を特定</text>

  <!-- ===== Step 3: Safety Constraint ===== -->
  <rect x="30" y="292" width="500" height="82" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="10"/>
  <rect x="30" y="292" width="120" height="26" fill="#1976D2" rx="6"/>
  <text x="90" y="309" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="#FFF">Step 3: 安全制約定義</text>
  <text x="200" y="310" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#0D47A1">Safety Constraint — 守るべきルール</text>

  <text x="50" y="334" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">SC1: 経験値の計算・保存はトランザクションで原子的に行う</text>
  <text x="50" y="354" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">SC2: すべてのAPIエンドポイントは認証ミドルウェアを必ず通過する</text>

  <!-- Arrow 3→4 -->
  <line x1="280" y1="374" x2="280" y2="405" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="292" y="393" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888">「制約が保証されているか」を検証</text>

  <!-- ===== Step 4: Control Structure ===== -->
  <rect x="30" y="408" width="500" height="100" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="10"/>
  <rect x="30" y="408" width="120" height="26" fill="#388E3C" rx="6"/>
  <text x="90" y="425" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="#FFF">Step 4: 制御構造確認</text>
  <text x="200" y="426" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#1B5E20">Control Structure — 設計の構造を問い直す</text>

  <text x="50" y="450" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">安全制約が実際の設計の中で保証されているかを検証する。</text>
  <text x="50" y="470" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">例: 「認証ミドルウェアを付け忘れた新エンドポイントを</text>
  <text x="66" y="488" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">作れてしまう構造になっていないか？」</text>

  <!-- Footer -->
  <text x="280" y="550" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#AAA">STAMP: Systems-Theoretic Accident Model and Processes（Nancy Leveson, MIT）</text>
</svg>
