<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 430" width="660" height="430">
  <rect width="660" height="430" fill="#FAFAFA" rx="8"/>

  <!-- ===== Guild（ギルド） ===== -->
  <rect x="20" y="30" width="175" height="160" fill="white" stroke="#1976D2" stroke-width="2" rx="6"/>
  <rect x="20" y="30" width="175" height="32" fill="#1976D2" rx="6"/>
  <rect x="20" y="54" width="175" height="8" fill="#1976D2"/>
  <text x="107" y="51" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="white">Guild（ギルド）</text>
  <line x1="20" y1="62" x2="195" y2="62" stroke="#BBDEFB" stroke-width="1"/>
  <!-- 属性 -->
  <text x="32" y="80" font-family="'Courier New',monospace" font-size="11" fill="#C62828">🔑 id</text>
  <line x1="20" y1="86" x2="195" y2="86" stroke="#E3F2FD" stroke-width="1"/>
  <text x="32" y="102" font-family="'Courier New',monospace" font-size="11" fill="#333">name</text>
  <line x1="20" y1="108" x2="195" y2="108" stroke="#E3F2FD" stroke-width="1"/>
  <text x="32" y="124" font-family="'Courier New',monospace" font-size="11" fill="#555">description</text>
  <line x1="20" y1="130" x2="195" y2="130" stroke="#E3F2FD" stroke-width="1"/>
  <text x="32" y="146" font-family="'Courier New',monospace" font-size="11" fill="#1565C0">🔗 master_id</text>
  <line x1="20" y1="152" x2="195" y2="152" stroke="#E3F2FD" stroke-width="1"/>
  <text x="32" y="168" font-family="'Courier New',monospace" font-size="11" fill="#555">created_at</text>
  <line x1="20" y1="174" x2="195" y2="174" stroke="#E3F2FD" stroke-width="1"/>
  <text x="32" y="185" font-family="'Courier New',monospace" font-size="9" fill="#AAA">  ← 🔗 = 外部キー(FK)</text>

  <!-- ===== Hero（勇者） ===== -->
  <rect x="242" y="30" width="175" height="200" fill="white" stroke="#388E3C" stroke-width="2" rx="6"/>
  <rect x="242" y="30" width="175" height="32" fill="#388E3C" rx="6"/>
  <rect x="242" y="54" width="175" height="8" fill="#388E3C"/>
  <text x="329" y="51" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="white">Hero（勇者）</text>
  <line x1="242" y1="62" x2="417" y2="62" stroke="#C8E6C9" stroke-width="1"/>
  <text x="254" y="80" font-family="'Courier New',monospace" font-size="11" fill="#C62828">🔑 id</text>
  <line x1="242" y1="86" x2="417" y2="86" stroke="#E8F5E9" stroke-width="1"/>
  <text x="254" y="102" font-family="'Courier New',monospace" font-size="11" fill="#333">name</text>
  <line x1="242" y1="108" x2="417" y2="108" stroke="#E8F5E9" stroke-width="1"/>
  <text x="254" y="124" font-family="'Courier New',monospace" font-size="11" fill="#333">level</text>
  <line x1="242" y1="130" x2="417" y2="130" stroke="#E8F5E9" stroke-width="1"/>
  <text x="254" y="146" font-family="'Courier New',monospace" font-size="11" fill="#333">experience_points</text>
  <line x1="242" y1="152" x2="417" y2="152" stroke="#E8F5E9" stroke-width="1"/>
  <text x="254" y="168" font-family="'Courier New',monospace" font-size="11" fill="#1565C0">🔗 guild_id</text>
  <line x1="242" y1="174" x2="417" y2="174" stroke="#E8F5E9" stroke-width="1"/>
  <text x="254" y="190" font-family="'Courier New',monospace" font-size="11" fill="#333">status</text>
  <line x1="242" y1="196" x2="417" y2="196" stroke="#E8F5E9" stroke-width="1"/>
  <text x="254" y="222" font-family="'Courier New',monospace" font-size="11" fill="#555">created_at</text>

  <!-- ===== Quest（クエスト） ===== -->
  <rect x="464" y="30" width="175" height="220" fill="white" stroke="#F57C00" stroke-width="2" rx="6"/>
  <rect x="464" y="30" width="175" height="32" fill="#F57C00" rx="6"/>
  <rect x="464" y="54" width="175" height="8" fill="#F57C00"/>
  <text x="551" y="51" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="white">Quest（クエスト）</text>
  <line x1="464" y1="62" x2="639" y2="62" stroke="#FFE0B2" stroke-width="1"/>
  <text x="476" y="80" font-family="'Courier New',monospace" font-size="11" fill="#C62828">🔑 id</text>
  <line x1="464" y1="86" x2="639" y2="86" stroke="#FFF3E0" stroke-width="1"/>
  <text x="476" y="102" font-family="'Courier New',monospace" font-size="11" fill="#333">title</text>
  <line x1="464" y1="108" x2="639" y2="108" stroke="#FFF3E0" stroke-width="1"/>
  <text x="476" y="124" font-family="'Courier New',monospace" font-size="11" fill="#555">description</text>
  <line x1="464" y1="130" x2="639" y2="130" stroke="#FFF3E0" stroke-width="1"/>
  <text x="476" y="146" font-family="'Courier New',monospace" font-size="11" fill="#333">difficulty</text>
  <line x1="464" y1="152" x2="639" y2="152" stroke="#FFF3E0" stroke-width="1"/>
  <text x="476" y="168" font-family="'Courier New',monospace" font-size="11" fill="#333">reward_exp</text>
  <line x1="464" y1="174" x2="639" y2="174" stroke="#FFF3E0" stroke-width="1"/>
  <text x="476" y="190" font-family="'Courier New',monospace" font-size="11" fill="#1565C0">🔗 creator_id</text>
  <line x1="464" y1="196" x2="639" y2="196" stroke="#FFF3E0" stroke-width="1"/>
  <text x="476" y="212" font-family="'Courier New',monospace" font-size="11" fill="#333">status</text>
  <line x1="464" y1="218" x2="639" y2="218" stroke="#FFF3E0" stroke-width="1"/>
  <text x="476" y="240" font-family="'Courier New',monospace" font-size="11" fill="#555">created_at</text>

  <!-- ===== QuestCompletion（クエスト達成）中間テーブル ===== -->
  <rect x="242" y="320" width="175" height="100" fill="white" stroke="#7B1FA2" stroke-width="2" rx="6"/>
  <rect x="242" y="320" width="175" height="32" fill="#7B1FA2" rx="6"/>
  <rect x="242" y="344" width="175" height="8" fill="#7B1FA2"/>
  <text x="329" y="336" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="white">QuestCompletion</text>
  <text x="329" y="349" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="white">（クエスト達成）</text>
  <line x1="242" y1="352" x2="417" y2="352" stroke="#E1BEE7" stroke-width="1"/>
  <text x="254" y="370" font-family="'Courier New',monospace" font-size="11" fill="#C62828">🔑 id</text>
  <line x1="242" y1="376" x2="417" y2="376" stroke="#F3E5F5" stroke-width="1"/>
  <text x="254" y="392" font-family="'Courier New',monospace" font-size="11" fill="#1565C0">🔗 hero_id</text>
  <line x1="242" y1="398" x2="417" y2="398" stroke="#F3E5F5" stroke-width="1"/>
  <text x="254" y="414" font-family="'Courier New',monospace" font-size="11" fill="#1565C0">🔗 quest_id</text>

  <!-- ===== リレーションシップ線 ===== -->
  <!-- Guild(1) → Hero(N): guild_id -->
  <line x1="195" y1="110" x2="242" y2="110" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="216" y="106" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">1:N</text>

  <!-- Hero(1) → QuestCompletion(N): hero_id -->
  <line x1="329" y1="230" x2="329" y2="320" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="345" y="278" font-family="sans-serif" font-size="10" fill="#888">1:N</text>

  <!-- Quest(1) → QuestCompletion(N): quest_id -->
  <line x1="551" y1="250" x2="551" y2="295" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="551" y1="295" x2="417" y2="370" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="500" y="310" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">1:N</text>

  <!-- Hero → Quest (creator_id): Hero creates Quest -->
  <line x1="417" y1="80" x2="464" y2="80" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="440" y="75" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">1:N</text>
</svg>
