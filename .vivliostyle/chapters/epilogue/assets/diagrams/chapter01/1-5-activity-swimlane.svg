<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" width="520" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="520" height="380" fill="#FAFAFA" rx="8"/>

  <!-- スイムレーンヘッダー背景 -->
  <rect x="0" y="0" width="520" height="40" fill="#E3F2FD" rx="8"/>
  <rect x="0" y="8" width="520" height="32" fill="#E3F2FD"/>

  <!-- 縦区切り -->
  <line x1="260" y1="0" x2="260" y2="380" stroke="#90CAF9" stroke-width="2"/>

  <!-- ヘッダーラベル -->
  <text x="130" y="28" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#1565C0">勇者</text>
  <text x="390" y="28" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#1565C0">システム</text>

  <!-- ===== 勇者レーン ===== -->
  <!-- 開始ノード -->
  <circle cx="130" cy="72" r="12" fill="#333"/>
  <line x1="130" y1="84" x2="130" y2="108" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- クエストを選択 -->
  <rect x="52" y="110" width="156" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="130" y="133" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" text-anchor="middle" fill="#333">クエストを選択</text>

  <!-- 右矢印（システムへ） -->
  <line x1="208" y1="128" x2="315" y2="175" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="263" y="148" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#888">選択を送信</text>

  <!-- 左矢印（システムから） -->
  <line x1="312" y1="245" x2="208" y2="272" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="263" y="268" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#888">難易度返却</text>

  <!-- 確認ダイアログ -->
  <rect x="52" y="278" width="156" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="130" y="301" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" text-anchor="middle" fill="#333">確認ダイアログ</text>
  <line x1="130" y1="314" x2="130" y2="355" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 終了ノード -->
  <circle cx="130" cy="368" r="13" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="130" cy="368" r="8" fill="#333"/>

  <!-- ===== システムレーン ===== -->
  <!-- 難易度を判定 -->
  <rect x="312" y="178" width="156" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="390" y="201" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" text-anchor="middle" fill="#333">難易度を判定</text>
  <line x1="390" y1="214" x2="390" y2="241" stroke="#555" stroke-width="2"/>
  <line x1="390" y1="241" x2="316" y2="241" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
</svg>
