<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      .class-rect { fill: #FFF; stroke: #333; stroke-width: 1.5; }
      .text-title { font-family: 'Noto Sans JP', monospace; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-attr { font-family: 'Noto Sans JP', monospace; font-size: 12px; fill: #333; }
      .line-sep { stroke: #333; stroke-width: 1; }
      .conn-line { stroke: #333; stroke-width: 1.5; fill: none; }
      .arrow { fill: none; stroke: #333; stroke-width: 1.5; }
      .diamond-filled { fill: #333; stroke: #333; } /* Composition */
      .diamond-empty { fill: #FFF; stroke: #333; stroke-width: 1.5; } /* Aggregation */
      .label-multi { font-family: monospace; font-size: 11px; fill: #333; background-color: white; }
    </style>
  </defs>

  <title>QuestForge クラス図</title>

  <!-- Hero Class -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="140" height="100" class="class-rect" />
    <text x="70" y="20" class="text-title">Hero</text>
    <line x1="0" y1="30" x2="140" y2="30" class="line-sep" />
    <text x="5" y="45" class="text-attr">+name: String</text>
    <text x="5" y="60" class="text-attr">+level: int</text>
    <line x1="0" y1="70" x2="140" y2="70" class="line-sep" />
    <text x="5" y="85" class="text-attr">+gainExp(amount)</text>
  </g>

  <!-- Quest Class -->
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="160" height="100" class="class-rect" />
    <text x="80" y="20" class="text-title">Quest</text>
    <line x1="0" y1="30" x2="160" y2="30" class="line-sep" />
    <text x="5" y="45" class="text-attr">+title: String</text>
    <text x="5" y="60" class="text-attr">+status: Status</text>
    <line x1="0" y1="70" x2="160" y2="70" class="line-sep" />
    <text x="5" y="85" class="text-attr">+complete()</text>
  </g>

  <!-- Badge Class -->
  <g transform="translate(350, 250)">
    <rect x="0" y="0" width="160" height="80" class="class-rect" />
    <text x="80" y="20" class="text-title">Badge</text>
    <line x1="0" y1="30" x2="160" y2="30" class="line-sep" />
    <text x="5" y="45" class="text-attr">+name: String</text>
    <line x1="0" y1="55" x2="160" y2="55" class="line-sep" />
    <text x="5" y="70" class="text-attr">+check(Hero)</text>
  </g>

  <!-- Relationships -->
  
  <!-- Hero -- Quest (Association) -->
  <path d="M 190 200 L 270 200 L 270 100 L 350 100" class="conn-line" />
  <text x="200" y="190" class="label-multi">1</text>
  <text x="330" y="90" class="label-multi">*</text>

  <!-- Hero *-- Badge (Composition) -->
  <path d="M 190 200 L 270 200 L 270 290 L 350 290" class="conn-line" />
  <!-- Diamond at Hero side -->
  <polygon points="190,200 200,195 210,200 200,205" class="diamond-filled" transform="translate(-20,0)"/> 
  <text x="220" y="220" class="label-multi">1</text>
  <text x="330" y="280" class="label-multi">*</text>

</svg>