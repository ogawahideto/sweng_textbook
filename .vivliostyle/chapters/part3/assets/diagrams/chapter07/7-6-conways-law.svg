<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360">
  <rect width="680" height="360" fill="#FAFAFA" rx="8"/>

  <!-- ===== タイトル ===== -->
  <text x="340" y="22" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#333">コンウェイの法則：組織の形がアーキテクチャの形になる</text>

  <!-- ============================================================ -->
  <!-- LEFT: 組織構造 -->
  <!-- ============================================================ -->
  <text x="160" y="50" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" font-weight="bold" fill="#1565C0">組織構造</text>

  <!-- フロントエンドチーム -->
  <rect x="60" y="60" width="200" height="52" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="8"/>
  <text x="160" y="82" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" font-weight="bold" fill="#1565C0">フロントエンドチーム</text>
  <text x="160" y="99" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#444">UI / React / デザイン</text>

  <!-- バックエンドチーム -->
  <rect x="60" y="135" width="200" height="52" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="8"/>
  <text x="160" y="157" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" font-weight="bold" fill="#1B5E20">バックエンドチーム</text>
  <text x="160" y="174" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#444">API / ビジネスロジック</text>

  <!-- インフラチーム -->
  <rect x="60" y="210" width="200" height="52" fill="#FFF3E0" stroke="#F57C00" stroke-width="2" rx="8"/>
  <text x="160" y="232" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" font-weight="bold" fill="#E65100">インフラチーム</text>
  <text x="160" y="249" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#444">DB / Kubernetes / CI</text>

  <!-- チーム間コミュニケーション線 -->
  <line x1="160" y1="112" x2="160" y2="135" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="160" y1="187" x2="160" y2="210" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============================================================ -->
  <!-- 中央矢印 -->
  <!-- ============================================================ -->
  <defs>
    <marker id="arr-main" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7B1FA2"/>
    </marker>
  </defs>
  <line x1="290" y1="183" x2="370" y2="183" stroke="#7B1FA2" stroke-width="2.5" marker-end="url(#arr-main)"/>
  <text x="330" y="172" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2">コンウェイの</text>
  <text x="330" y="185" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2">法則</text>
  <text x="330" y="198" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#9C27B0">→ 鏡に映る</text>

  <!-- ============================================================ -->
  <!-- RIGHT: アーキテクチャ -->
  <!-- ============================================================ -->
  <text x="530" y="50" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" font-weight="bold" fill="#1565C0">アーキテクチャ</text>

  <!-- フロントエンド層 -->
  <rect x="390" y="60" width="270" height="52" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="8"/>
  <text x="525" y="82" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#1565C0">フロントエンド層</text>
  <text x="525" y="99" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#444">React SPA / Next.js</text>

  <!-- API層 -->
  <rect x="390" y="135" width="270" height="52" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="8"/>
  <text x="525" y="157" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#1B5E20">API層</text>
  <text x="525" y="174" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#444">REST / GraphQL / FastAPI</text>

  <!-- インフラ層 -->
  <rect x="390" y="210" width="270" height="52" fill="#FFF3E0" stroke="#F57C00" stroke-width="2" rx="8"/>
  <text x="525" y="232" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#E65100">インフラ層</text>
  <text x="525" y="249" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#444">PostgreSQL / K8s / GitHub Actions</text>

  <!-- アーキテクチャ層間の境界線 -->
  <line x1="400" y1="112" x2="650" y2="112" stroke="#1976D2" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="187" x2="650" y2="187" stroke="#388E3C" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============================================================ -->
  <!-- 下部: 逆コンウェイ戦略 -->
  <!-- ============================================================ -->
  <rect x="30" y="285" width="620" height="58" fill="white" stroke="#7B1FA2" stroke-width="1.5" rx="8"/>
  <text x="340" y="305" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="#6A1B9A">逆コンウェイ戦略（Inverse Conway Maneuver）</text>
  <text x="340" y="322" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#555">目標のアーキテクチャ（右）を先に設計し、それに合わせてチーム（左）を編成する</text>
  <text x="340" y="337" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#7B1FA2">例: マイクロサービス化を目指すなら → クエストチーム・勇者チーム・ギルドチームを作る</text>

  <!-- カラー対応ブラケット -->
  <rect x="50" y="275" width="10" height="4" fill="#1976D2" rx="1"/>
  <rect x="50" y="279" width="10" height="4" fill="#388E3C" rx="1"/>
  <rect x="50" y="283" width="10" height="4" fill="#F57C00" rx="1"/>
  <text x="62" y="284" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="8" fill="#888">組織とアーキテクチャの色が対応</text>
</svg>
