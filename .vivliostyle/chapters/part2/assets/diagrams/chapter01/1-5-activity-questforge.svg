<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 580" width="600" height="580">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="600" height="580" fill="#FAFAFA" rx="8"/>

  <!-- スイムレーンヘッダー -->
  <rect x="0" y="0" width="600" height="40" fill="#E3F2FD" rx="8"/>
  <rect x="0" y="8" width="600" height="32" fill="#E3F2FD"/>
  <line x1="300" y1="0" x2="300" y2="580" stroke="#90CAF9" stroke-width="2"/>

  <text x="150" y="28" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#1565C0">勇者</text>
  <text x="450" y="28" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#1565C0">QuestForge</text>

  <!-- ===== 勇者レーン ===== -->
  <!-- 開始ノード -->
  <circle cx="150" cy="72" r="12" fill="#333"/>
  <line x1="150" y1="84" x2="150" y2="108" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 完了ボタン押下 -->
  <rect x="66" y="110" width="168" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="150" y="133" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">完了ボタン押下</text>

  <!-- 右矢印（QuestForgeへ） -->
  <line x1="234" y1="128" x2="360" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="298" y="148" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#888">完了リクエスト</text>

  <!-- 左矢印（QuestForgeから：結果） -->
  <line x1="358" y1="460" x2="234" y2="462" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="298" y="455" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#888">結果通知</text>

  <!-- 結果を確認 -->
  <rect x="66" y="468" width="168" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="150" y="491" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">結果を確認</text>
  <line x1="150" y1="504" x2="150" y2="540" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 終了ノード -->
  <circle cx="150" cy="555" r="13" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="150" cy="555" r="8" fill="#333"/>

  <!-- ===== QuestForgeレーン ===== -->
  <!-- 経験値を計算 -->
  <rect x="360" y="173" width="168" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="444" y="196" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">経験値を計算</text>
  <line x1="444" y1="209" x2="444" y2="238" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 分岐ひし形（レベルアップ？） -->
  <polygon points="444,240 490,268 444,296 398,268" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="444" y="264" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#E65100">LvUp?</text>
  <text x="444" y="277" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#E65100">（レベルアップ？）</text>

  <!-- YES分岐：演出表示 -->
  <line x1="490" y1="268" x2="545" y2="268" stroke="#555" stroke-width="2"/>
  <line x1="545" y1="268" x2="545" y2="330" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="520" y="262" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#555">YES</text>

  <rect x="500" y="332" width="90" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="14"/>
  <text x="545" y="355" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#333">演出表示</text>
  <line x1="545" y1="368" x2="545" y2="404" stroke="#555" stroke-width="2"/>
  <line x1="545" y1="404" x2="484" y2="404" stroke="#555" stroke-width="2"/>

  <!-- NO分岐：そのまま下へ -->
  <line x1="444" y1="296" x2="444" y2="340" stroke="#555" stroke-width="2"/>
  <text x="430" y="320" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#555">NO</text>
  <line x1="444" y1="340" x2="444" y2="404" stroke="#555" stroke-width="2"/>

  <!-- 合流→結果を保存 -->
  <line x1="444" y1="404" x2="444" y2="420" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="360" y="422" width="168" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="444" y="445" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">結果を保存</text>
</svg>
