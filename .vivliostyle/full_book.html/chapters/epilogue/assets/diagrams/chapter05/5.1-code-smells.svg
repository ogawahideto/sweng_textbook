<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .smell-box { fill: #FFFDE7; stroke: #FBC02D; stroke-width: 1; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" class="bg"/>
  <title>代表的なコードの匂い</title>

  <text x="250" y="40" class="text-main" text-anchor="middle" font-size="18">不吉なコードの匂い (Code Smells)</text>

  <!-- 長すぎる関数 -->
  <rect x="50" y="70" width="180" height="100" rx="5" class="smell-box" />
  <text x="65" y="95" class="text-main">1. 長すぎる関数</text>
  <text x="65" y="120" class="text-sub">何でも詰め込みすぎた長文呪文</text>
  <text x="65" y="140" class="text-sub">→ メソッドの抽出で分割</text>

  <!-- 巨大なクラス -->
  <rect x="270" y="70" width="180" height="100" rx="5" class="smell-box" />
  <text x="285" y="95" class="text-main">2. 巨大なクラス</text>
  <text x="285" y="120" class="text-sub">全知全能の「神」クラス</text>
  <text x="285" y="140" class="text-sub">→ クラスの抽出で分権</text>

  <!-- 重複したコード -->
  <rect x="50" y="190" width="180" height="100" rx="5" class="smell-box" />
  <text x="65" y="215" class="text-main">3. 重複したコード</text>
  <text x="65" y="240" class="text-sub">コピペから生まれる諸悪の根源</text>
  <text x="65" y="260" class="text-sub">→ DRY原則で共通化</text>

  <!-- データ泥棒 -->
  <rect x="270" y="190" width="180" height="100" rx="5" class="smell-box" />
  <text x="285" y="215" class="text-main">4. データ泥棒</text>
  <text x="285" y="120" class="text-sub" dy="120">他人のデータをいじりすぎ</text>
  <text x="285" y="140" class="text-sub" dy="120">→ メソッドの移動でカプセル化</text>
</svg>