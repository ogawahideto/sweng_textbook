<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      .node-obs { fill: #E3F2FD; stroke: #1E88E5; stroke-width: 2; }
      .node-hyp { fill: #FFF3E0; stroke: #FB8C00; stroke-width: 2; }
      .node-exp { fill: #F3E5F5; stroke: #8E24AA; stroke-width: 2; }
      .node-con { fill: #E8F5E9; stroke: #43A047; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #666; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#666" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <rect x="0" y="0" width="500" height="400" fill="#FAFAFA"/>
  <title>デバッグの仮説検証サイクル</title>

  <!-- サイクル: 円状に配置 -->
  <!-- 1. 観察 (Observation) -->
  <circle cx="250" cy="80" r="50" class="node-obs" />
  <text x="250" y="85" class="text-main">1. 観察</text>
  <text x="250" y="105" class="text-sub">エラー・ログの把握</text>

  <!-- 2. 仮説 (Hypothesis) -->
  <circle cx="400" cy="200" r="50" class="node-hyp" />
  <text x="400" y="205" class="text-main">2. 仮説</text>
  <text x="400" y="225" class="text-sub">原因の推測</text>

  <!-- 3. 実験 (Experiment) -->
  <circle cx="250" cy="320" r="50" class="node-exp" />
  <text x="250" y="325" class="text-main">3. 実験</text>
  <text x="250" y="345" class="text-sub">最小限のコード修正</text>

  <!-- 4. 結論 (Conclusion) -->
  <circle cx="100" cy="200" r="50" class="node-con" />
  <text x="100" y="205" class="text-main">4. 結論</text>
  <text x="100" y="225" class="text-sub">修正の確認・記録</text>

  <!-- 矢印 -->
  <path d="M 285,95 Q 350,120 375,160" class="arrow" />
  <path d="M 385,245 Q 350,290 285,310" class="arrow" />
  <path d="M 215,310 Q 150,290 125,245" class="arrow" />
  <path d="M 115,160 Q 150,120 215,95" class="arrow" />

  <!-- 中央のテキスト -->
  <text x="250" y="205" class="text-main" font-size="20">推理ゲーム</text>
</svg>