<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      .axis { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .line-o1 { stroke: #4A90D9; stroke-width: 3; fill: none; }
      .line-ologn { stroke: #7CB342; stroke-width: 3; fill: none; }
      .line-on { stroke: #FFB74D; stroke-width: 3; fill: none; }
      .line-onlogn { stroke: #E57373; stroke-width: 3; fill: none; }
      .line-on2 { stroke: #9575CD; stroke-width: 3; fill: none; }
      .text-label { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#333" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>魔法のコスト曲線 (Big-O)</title>
  <rect x="0" y="0" width="500" height="400" fill="#FAFAFA"/>

  <!-- 軸 -->
  <line x1="50" y1="350" x2="480" y2="350" class="axis" />
  <line x1="50" y1="350" x2="50" y2="30" class="axis" />

  <text x="450" y="380" class="text-label" text-anchor="middle">データ量 (N)</text>
  <text x="40" y="40" class="text-label" text-anchor="end">時間</text>

  <line x1="50" y1="340" x2="450" y2="340" class="line-o1" />
  <text x="460" y="345" class="text-label" fill="#4A90D9">O(1)</text>

  <path d="M 50 350 Q 150 300 450 280" class="line-ologn" />
  <text x="460" y="285" class="text-label" fill="#7CB342">O(log N)</text>

  <line x1="50" y1="350" x2="400" y2="100" class="line-on" />
  <text x="410" y="100" class="text-label" fill="#FFB74D">O(N)</text>

  <path d="M 50 350 Q 150 200 300 50" class="line-onlogn" />
  <text x="310" y="50" class="text-label" fill="#E57373">O(N log N)</text>

  <path d="M 50 350 Q 80 300 120 50" class="line-on2" />
  <text x="130" y="50" class="text-label" fill="#9575CD">O(N^2)</text>

</svg>