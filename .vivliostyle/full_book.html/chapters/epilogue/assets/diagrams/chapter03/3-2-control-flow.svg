<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .box-bad { fill: #FFEBEE; stroke: #D32F2F; stroke-width: 1; }
      .box-good { fill: #E8F5E9; stroke: #43A047; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .line { stroke: #666; stroke-width: 2; fill: none; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="300" class="bg"/>
  
  <!-- Nested (Bad) -->
  <rect x="30" y="50" width="200" height="200" rx="5" class="box-bad" />
  <text x="130" y="40" class="text-main" text-anchor="middle">ネストの塔 (複雑)</text>
  <path d="M 50,80 L 100,80 L 100,120 L 150,120 L 150,160 L 200,160" class="line" stroke="#D32F2F" />
  <text x="130" y="230" class="text-main" text-anchor="middle" font-size="12" fill="#D32F2F">どこで終わるか不明瞭</text>

  <!-- Guard Clauses (Good) -->
  <rect x="270" y="50" width="200" height="200" rx="5" class="box-good" />
  <text x="370" y="40" class="text-main" text-anchor="middle">ガード節 (淀みない)</text>
  <path d="M 290,80 L 340,80 M 290,120 L 340,120 M 290,160 L 450,160" class="line" stroke="#43A047" />
  <text x="370" y="230" class="text-main" text-anchor="middle" font-size="12" fill="#43A047">本質的な処理へ一直線</text>
</svg>