<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      .axis { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
      .quadrant-bg { fill: #FAFAFA; stroke: #DDD; stroke-width: 1; }
      .text-label { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
      .text-quadrant { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
      .bubble { fill: #E3F2FD; stroke: #4A90D9; stroke-width: 2; opacity: 0.8; }
      .bubble-text { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #333; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#666" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>ステークホルダー・マップ</title>
  <rect x="0" y="0" width="500" height="400" fill="#FFF"/>

  <!-- 象限 -->
  <rect x="50" y="50" width="200" height="150" class="quadrant-bg" />
  <rect x="250" y="50" width="200" height="150" class="quadrant-bg" />
  <rect x="50" y="200" width="200" height="150" class="quadrant-bg" />
  <rect x="250" y="200" width="200" height="150" class="quadrant-bg" />

  <!-- 軸 -->
  <line x1="50" y1="350" x2="50" y2="30" class="axis" /> <!-- 影響力 -->
  <line x1="30" y1="350" x2="470" y2="350" class="axis" /> <!-- 関心 -->

  <text x="30" y="40" class="text-label" text-anchor="end">影響力 (Power)</text>
  <text x="450" y="380" class="text-label" text-anchor="middle">関心 (Interest)</text>

  <!-- ラベル -->
  <text x="150" y="125" class="text-quadrant">満足させる<br/>(Keep Satisfied)</text>
  <text x="350" y="125" class="text-quadrant" font-weight="bold" fill="#1E88E5">密接に管理する<br/>(Manage Closely)</text>
  <text x="150" y="275" class="text-quadrant">最小限の努力<br/>(Monitor)</text>
  <text x="350" y="275" class="text-quadrant">情報提供し続ける<br/>(Keep Informed)</text>

  <!-- サンプルのバブル -->
  <g transform="translate(400, 80)">
    <circle r="35" class="bubble" />
    <text y="5" class="bubble-text">経営層 / 王</text>
  </g>
  <g transform="translate(380, 290)">
    <circle r="30" class="bubble" style="fill: #E8F5E9; stroke: #81C784;" />
    <text y="5" class="bubble-text">ユーザー / 民</text>
  </g>

</svg>