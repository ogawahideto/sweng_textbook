<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .box-before { fill: #FFEBEE; stroke: #D32F2F; stroke-width: 1; }
      .box-after { fill: #E3F2FD; stroke: #1E88E5; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#666" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="350" class="bg"/>
  <title>Strategyパターンへのリファクタリング</title>

  <!-- Before -->
  <rect x="40" y="60" width="160" height="180" rx="5" class="box-before" />
  <text x="120" y="40" class="text-main" text-anchor="middle">Before: 条件分岐の塔</text>
  <text x="50" y="100" class="text-main" font-size="12">if type == 'A':</text>
  <text x="60" y="120" class="text-main" font-size="12">...</text>
  <text x="50" y="140" class="text-main" font-size="12">elif type == 'B':</text>
  <text x="60" y="160" class="text-main" font-size="12">...</text>
  <text x="50" y="180" class="text-main" font-size="12">elif type == 'C':</text>
  
  <!-- 矢印 -->
  <path d="M 220,150 L 280,150" class="arrow" />
  <text x="250" y="140" class="text-main" font-size="10" text-anchor="middle">浄化</text>

  <!-- After -->
  <rect x="300" y="60" width="160" height="180" rx="5" class="box-after" />
  <text x="380" y="40" class="text-main" text-anchor="middle">After: 美しき多態性</text>
  <text x="310" y="100" class="text-main" font-size="12">Strategy (抽象)</text>
  <line x1="310" y1="110" x2="450" y2="110" stroke="#1E88E5" stroke-dasharray="2" />
  <rect x="320" y="130" width="40" height="30" rx="2" fill="#E8F5E9" stroke="#43A047" />
  <text x="340" y="150" class="text-main" font-size="10" text-anchor="middle">TypeA</text>
  <rect x="370" y="130" width="40" height="30" rx="2" fill="#E8F5E9" stroke="#43A047" />
  <text x="390" y="150" class="text-main" font-size="10" text-anchor="middle">TypeB</text>
  <rect x="420" y="130" width="40" height="30" rx="2" fill="#E8F5E9" stroke="#43A047" />
  <text x="440" y="150" class="text-main" font-size="10" text-anchor="middle">TypeC</text>
  
  <text x="380" y="220" class="text-main" font-size="12" text-anchor="middle">拡張に対して開き</text>
  <text x="380" y="235" class="text-main" font-size="12" text-anchor="middle">修正に対して閉じている</text>
</svg>