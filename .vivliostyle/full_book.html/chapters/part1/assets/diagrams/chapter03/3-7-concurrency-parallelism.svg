<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .bar { stroke-width: 8; stroke-linecap: round; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="300" class="bg"/>
  
  <!-- 並行 (Concurrency) -->
  <text x="130" y="50" class="text-main" text-anchor="middle">並行 (Concurrency)</text>
  <text x="130" y="70" class="text-main" font-size="10" font-weight="normal" text-anchor="middle">1人で複数の術を切り替える</text>
  <line x1="50" y1="100" x2="100" y2="100" class="bar" stroke="#1E88E5" />
  <line x1="110" y1="130" x2="160" y2="130" class="bar" stroke="#43A047" />
  <line x1="170" y1="100" x2="210" y2="100" class="bar" stroke="#1E88E5" />

  <!-- 並列 (Parallelism) -->
  <text x="370" y="50" class="text-main" text-anchor="middle">並列 (Parallelism)</text>
  <text x="370" y="70" class="text-main" font-size="10" font-weight="normal" text-anchor="middle">複数人で同時に術を放つ</text>
  <line x1="300" y1="100" x2="450" y2="100" class="bar" stroke="#1E88E5" />
  <line x1="300" y1="130" x2="450" y2="130" class="bar" stroke="#43A047" />

  <text x="250" y="230" class="text-main" text-anchor="middle" font-size="12">async/await  vs Multi-threading</text>
</svg>