<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="700" height="450">
  <defs>
    <style>
      .lifeline { stroke: #333; stroke-width: 1.5; stroke-dasharray: 5,5; }
      .actor-rect { fill: #E3F2FD; stroke: #4A90D9; stroke-width: 2; }
      .activation { fill: #FFF; stroke: #333; stroke-width: 1; }
      .message { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .return-message { stroke: #333; stroke-width: 1; fill: none; stroke-dasharray: 4,2; marker-end: url(#arrowhead); }
      .text-label { font-family: 'Noto Sans JP', monospace; font-size: 13px; fill: #333; text-anchor: middle; }
      .text-msg { font-family: 'Noto Sans JP', monospace; font-size: 11px; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#333" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>クエスト完了シーケンス図</title>

  <!-- Lifelines -->
  <g transform="translate(80, 0)">
    <rect x="-40" y="20" width="80" height="30" class="actor-rect" />
    <text x="0" y="40" class="text-label">ユーザー</text>
    <line x1="0" y1="50" x2="0" y2="400" class="lifeline" />
  </g>

  <g transform="translate(230, 0)">
    <rect x="-50" y="20" width="100" height="30" class="actor-rect" />
    <text x="0" y="40" class="text-label">Controller</text>
    <line x1="0" y1="50" x2="0" y2="400" class="lifeline" />
    <rect x="-5" y="80" width="10" height="280" class="activation" />
  </g>

  <g transform="translate(380, 0)">
    <rect x="-40" y="20" width="80" height="30" class="actor-rect" />
    <text x="0" y="40" class="text-label">Quest</text>
    <line x1="0" y1="50" x2="0" y2="400" class="lifeline" />
    <rect x="-5" y="100" width="10" height="60" class="activation" />
  </g>

  <g transform="translate(530, 0)">
    <rect x="-40" y="20" width="80" height="30" class="actor-rect" />
    <text x="0" y="40" class="text-label">Hero</text>
    <line x1="0" y1="50" x2="0" y2="400" class="lifeline" />
    <rect x="-5" y="200" width="10" height="40" class="activation" />
  </g>

  <!-- Messages -->
  <!-- 1: ユーザー -> Controller -->
  <line x1="80" y1="80" x2="225" y2="80" class="message" />
  <text x="150" y="75" class="text-msg" text-anchor="middle">complete_quest(id)</text>

  <!-- 2: Controller -> Quest -->
  <line x1="235" y1="110" x2="375" y2="110" class="message" />
  <text x="305" y="105" class="text-msg" text-anchor="middle">set_status("COMPLETED")</text>

  <!-- 3: Controller -> Quest (get_reward) -->
  <line x1="235" y1="140" x2="375" y2="140" class="message" />
  <text x="305" y="135" class="text-msg" text-anchor="middle">get_reward()</text>
  <line x1="375" y1="160" x2="235" y2="160" class="return-message" />
  <text x="305" y="155" class="text-msg" text-anchor="middle">reward_obj</text>

  <!-- 4: Controller -> Hero (add_exp) -->
  <line x1="235" y1="210" x2="525" y2="210" class="message" />
  <text x="380" y="205" class="text-msg" text-anchor="middle">add_exp(reward.exp)</text>
  <line x1="525" y1="240" x2="235" y2="240" class="return-message" />
  <text x="380" y="235" class="text-msg" text-anchor="middle">success</text>

  <!-- 5: Controller -> ユーザー (結果表示) -->
  <line x1="225" y1="350" x2="80" y2="350" class="return-message" />
  <text x="150" y="345" class="text-msg" text-anchor="middle">"Level Up!"</text>

</svg>