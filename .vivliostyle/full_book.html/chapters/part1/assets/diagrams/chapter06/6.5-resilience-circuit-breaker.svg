<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .state { fill: #FFF; stroke-width: 3; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#666" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="300" class="bg"/>
  <title>サーキットブレーカーの3つの状態</title>

  <!-- Closed -->
  <circle cx="100" cy="150" r="45" class="state" style="stroke: #43A047;" />
  <text x="100" y="155" class="text-main">CLOSED</text>
  <text x="100" y="215" class="text-main" font-size="10" font-weight="normal">正常 (通電)</text>

  <!-- Open -->
  <circle cx="400" cy="150" r="45" class="state" style="stroke: #D32F2F;" />
  <text x="400" y="155" class="text-main">OPEN</text>
  <text x="400" y="215" class="text-main" font-size="10" font-weight="normal">遮断 (防御中)</text>

  <!-- Half-Open -->
  <circle cx="250" cy="150" r="45" class="state" style="stroke: #FB8C00;" stroke-dasharray="4" />
  <text x="250" y="155" class="text-main">HALF-OPEN</text>
  <text x="250" y="215" class="text-main" font-size="10" font-weight="normal">試行 (復旧確認)</text>

  <!-- Transitions -->
  <path d="M 150,130 L 350,130" class="arrow" /> <!-- Failures -->
  <path d="M 350,170 L 150,170" class="arrow" /> <!-- Success -->
</svg>