<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <style>
      .node { stroke-width: 3; rx: 10; ry: 10; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); }
      .node-red { fill: #FFEBEE; stroke: #E57373; }
      .node-green { fill: #E8F5E9; stroke: #81C784; }
      .node-refactor { fill: #E3F2FD; stroke: #64B5F6; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 18px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-desc { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #666; text-anchor: middle; }
      .arrow { stroke: #999; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#999" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>TDD サイクル</title>
  <rect x="0" y="0" width="600" height="300" fill="#FAFAFA"/>

  <!-- Red -->
  <g transform="translate(100, 150)">
    <rect x="-70" y="-40" width="140" height="80" class="node node-red" />
    <text x="0" y="-5" class="text-title" fill="#C62828">RED</text>
    <text x="0" y="15" class="text-desc">テストを書く</text>
    <text x="0" y="30" class="text-desc">(失敗させる)</text>
  </g>

  <!-- Green -->
  <g transform="translate(300, 150)">
    <rect x="-70" y="-40" width="140" height="80" class="node node-green" />
    <text x="0" y="-5" class="text-title" fill="#2E7D32">GREEN</text>
    <text x="0" y="15" class="text-desc">最小実装</text>
    <text x="0" y="30" class="text-desc">(成功させる)</text>
  </g>

  <!-- Refactor -->
  <g transform="translate(500, 150)">
    <rect x="-70" y="-40" width="140" height="80" class="node node-refactor" />
    <text x="0" y="-5" class="text-title" fill="#1565C0">REFACTOR</text>
    <text x="0" y="15" class="text-desc">コードを磨く</text>
    <text x="0" y="30" class="text-desc">(成功を保つ)</text>
  </g>

  <!-- Arrows -->
  <path d="M 170 150 L 220 150" class="arrow" />
  <path d="M 370 150 L 420 150" class="arrow" />
  <!-- Return Arrow -->
  <path d="M 500 110 Q 300 10 100 110" class="arrow" />

</svg>