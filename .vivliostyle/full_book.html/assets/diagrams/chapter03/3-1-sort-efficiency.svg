<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <style>
      .box { fill: #FFF; stroke: #333; stroke-width: 2; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-body { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #555; }
      .accent-red { fill: #FFEBEE; stroke: #E57373; }
      .accent-green { fill: #E8F5E9; stroke: #81C784; }
    </style>
  </defs>

  <title>ソート魔法の効率差</title>
  <rect x="0" y="0" width="600" height="300" fill="#FAFAFA"/>

  <!-- バブルソート (左) -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="220" height="200" class="box accent-red" />
    <text x="110" y="30" class="text-title">バブルソート (O(N^2))</text>
    <text x="20" y="70" class="text-body">100万件のデータの場合:</text>
    <text x="20" y="100" class="text-body" font-size="18" font-weight="bold">約 1兆回</text>
    <text x="20" y="130" class="text-body">の操作が必要</text>
    <text x="110" y="170" class="text-body" text-anchor="middle" font-style="italic">「終わらない詠唱...」</text>
  </g>

  <!-- マージソート (右) -->
  <g transform="translate(330, 50)">
    <rect x="0" y="0" width="220" height="200" class="box accent-green" />
    <text x="110" y="30" class="text-title">マージソート (O(N log N))</text>
    <text x="20" y="70" class="text-body">100万件のデータの場合:</text>
    <text x="20" y="100" class="text-body" font-size="18" font-weight="bold">約 2000万回</text>
    <text x="20" y="130" class="text-body">の操作で完了</text>
    <text x="110" y="170" class="text-body" text-anchor="middle" font-style="italic">「洗練された術式」</text>
  </g>

  <!-- 矢印または比較ラベル -->
  <text x="300" y="150" class="text-title" font-size="24">vs</text>

</svg>