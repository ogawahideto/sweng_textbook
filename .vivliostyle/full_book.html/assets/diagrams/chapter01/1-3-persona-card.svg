<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      .card-bg { fill: #FFF; stroke: #DDD; stroke-width: 2; rx: 10; ry: 10; filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.1)); }
      .photo-bg { fill: #E0E0E0; }
      .text-name { font-family: 'Noto Sans JP', sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
      .text-role { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; fill: #666; }
      .text-quote { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-style: italic; fill: #555; }
      .text-header { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: bold; fill: #4A90D9; }
      .text-body { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; fill: #333; }
      .section-bg { fill: #F9F9F9; rx: 5; ry: 5; }
    </style>
  </defs>

  <title>ペルソナカード</title>

  <!-- カード背景 -->
  <rect x="10" y="10" width="580" height="380" class="card-bg" />

  <!-- 写真エリア (左上) -->
  <rect x="40" y="40" width="100" height="100" class="photo-bg" rx="50" />
  <circle cx="90" cy="80" r="25" fill="#FFF" />
  <path d="M 65,130 Q 90,90 115,130" fill="#FFF" />

  <!-- 基本情報 (右上) -->
  <text x="170" y="70" class="text-name">鈴木 翔太 (25歳)</text>
  <text x="170" y="100" class="text-role">ITエンジニア / RPG好き / 成長志向</text>
  <text x="170" y="130" class="text-quote">"もっとレベルアップしてる実感が欲しいんだよなあ"</text>

  <!-- 目標エリア (左下) -->
  <rect x="40" y="170" width="240" height="180" class="section-bg" />
  <text x="50" y="200" class="text-header">Goals (目標)</text>
  <text x="50" y="230" class="text-body">• タスクを確実に消化したい</text>
  <text x="50" y="255" class="text-body">• 自分の成長を可視化したい</text>
  <text x="50" y="280" class="text-body">• 楽しく継続したい</text>

  <!-- 悩みエリア (右下) -->
  <rect x="310" y="170" width="240" height="180" class="section-bg" />
  <text x="320" y="200" class="text-header" fill="#E57373">Pain Points (悩み)</text>
  <text x="320" y="230" class="text-body">• タスク山積みでやる気が出ない</text>
  <text x="320" y="255" class="text-body">• 達成感が薄い</text>
  <text x="320" y="280" class="text-body">• 優先順位がつけられない</text>

</svg>