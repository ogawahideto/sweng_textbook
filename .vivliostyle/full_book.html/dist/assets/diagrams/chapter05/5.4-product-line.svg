<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .box-core { fill: #FFF3E0; stroke: #FB8C00; stroke-width: 3; }
      .box-variant { fill: #E3F2FD; stroke: #1E88E5; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" class="bg"/>
  <title>ソフトウェアプロダクトライン</title>

  <!-- Core Assets -->
  <rect x="150" y="50" width="200" height="100" rx="10" class="box-core" />
  <text x="250" y="90" class="text-main" text-anchor="middle">共通コア資産</text>
  <text x="250" y="115" class="text-sub" text-anchor="middle">(共通の魔法体系・基盤)</text>

  <!-- Production Line -->
  <path d="M 250,150 L 250,200" stroke="#FB8C00" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Variants -->
  <rect x="50" y="220" width="120" height="80" rx="5" class="box-variant" />
  <text x="110" y="250" class="text-main" text-anchor="middle">製品A</text>
  <text x="110" y="275" class="text-sub" text-anchor="middle">RPG版</text>

  <rect x="190" y="220" width="120" height="80" rx="5" class="box-variant" />
  <text x="250" y="250" class="text-main" text-anchor="middle">製品B</text>
  <text x="250" y="275" class="text-sub" text-anchor="middle">SLG版</text>

  <rect x="330" y="220" width="120" height="80" rx="5" class="box-variant" />
  <text x="390" y="250" class="text-main" text-anchor="middle">製品C</text>
  <text x="390" y="275" class="text-sub" text-anchor="middle">スマホ版</text>

  <text x="250" y="330" class="text-main" text-anchor="middle" font-size="12">「再利用」から「量産」への転換</text>
</svg>