<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .circle-main { fill: #E3F2FD; stroke: #1E88E5; stroke-width: 3; fill-opacity: 0.3; }
      .node { fill: #FFF3E0; stroke: #FB8C00; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666; text-anchor: middle; }
      .arrow { stroke: #FB8C00; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#FB8C00" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <rect x="0" y="0" width="500" height="400" class="bg"/>
  <title>スクラムの祝祭（サイクル）</title>

  <!-- 中心円: スプリント -->
  <circle cx="250" cy="200" r="100" class="circle-main" />
  <text x="250" y="195" class="text-main" font-size="18">スプリント</text>
  <text x="250" y="215" class="text-sub">1〜2週間の冒険</text>

  <!-- 各祝祭 (セレモニー) -->
  <!-- 1. プランニング -->
  <rect x="200" y="40" width="100" height="50" rx="10" class="node" />
  <text x="250" y="65" class="text-main">プランニング</text>
  <text x="250" y="80" class="text-sub">冒険の計画</text>

  <!-- 2. デイリースクラム (内部ループ) -->
  <circle cx="380" cy="150" r="35" class="node" />
  <text x="380" y="148" class="text-main">デイリー</text>
  <text x="380" y="163" class="text-sub">作戦会議</text>

  <!-- 3. レビュー -->
  <rect x="330" y="280" width="100" height="50" rx="10" class="node" />
  <text x="380" y="305" class="text-main">レビュー</text>
  <text x="380" y="320" class="text-sub">戦利品の披露</text>

  <!-- 4. レトロスペクティブ -->
  <rect x="70" y="280" width="100" height="50" rx="10" class="node" />
  <text x="120" y="305" class="text-main">レトロ</text>
  <text x="120" y="320" class="text-sub">焚き火の語らい</text>

  <!-- 矢印 -->
  <path d="M 300,65 Q 380,80 380,115" class="arrow" />
  <path d="M 380,185 Q 380,240 380,280" class="arrow" />
  <path d="M 330,305 L 170,305" class="arrow" />
  <path d="M 120,280 Q 120,65 200,65" class="arrow" />

</svg>