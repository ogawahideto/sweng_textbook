<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      .category-rect { stroke-width: 2; rx: 10; ry: 10; }
      .cat-creational { fill: #E1F5FE; stroke: #039BE5; }
      .cat-structural { fill: #E8F5E9; stroke: #43A047; }
      .cat-behavioral { fill: #FFF9C4; stroke: #FBC02D; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 18px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-body { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; fill: #555; }
      .pattern-label { font-family: monospace; font-size: 12px; fill: #333; }
    </style>
  </defs>

  <title>デザインパターンの地図</title>
  <rect x="0" y="0" width="600" height="400" fill="#FAFAFA"/>

  <!-- 生成に関するパターン -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="160" height="300" class="category-rect cat-creational" />
    <text x="80" y="30" class="text-title">生成</text>
    <text x="80" y="55" class="text-body" text-anchor="middle">(Creational)</text>
    <g transform="translate(20, 90)">
      <text y="0" class="pattern-label">• Factory Method</text>
      <text y="30" class="pattern-label">• Abstract Factory</text>
      <text y="60" class="pattern-label">• Builder</text>
      <text y="90" class="pattern-label">• Prototype</text>
      <text y="120" class="pattern-label" font-weight="bold">• Singleton</text>
    </g>
  </g>

  <!-- 構造に関するパターン -->
  <g transform="translate(220, 50)">
    <rect x="0" y="0" width="160" height="300" class="category-rect cat-structural" />
    <text x="80" y="30" class="text-title">構造</text>
    <text x="80" y="55" class="text-body" text-anchor="middle">(Structural)</text>
    <g transform="translate(20, 90)">
      <text y="0" class="pattern-label">• Adapter</text>
      <text y="30" class="pattern-label">• Bridge</text>
      <text y="60" class="pattern-label">• Composite</text>
      <text y="90" class="pattern-label">• Decorator</text>
      <text y="120" class="pattern-label">• Facade</text>
      <text y="150" class="pattern-label">• Proxy</text>
    </g>
  </g>

  <!-- 振る舞いに関するパターン -->
  <g transform="translate(390, 50)">
    <rect x="0" y="0" width="160" height="300" class="category-rect cat-behavioral" />
    <text x="80" y="30" class="text-title">振る舞い</text>
    <text x="80" y="55" class="text-body" text-anchor="middle">(Behavioral)</text>
    <g transform="translate(20, 90)">
      <text y="0" class="pattern-label" font-weight="bold">• Strategy</text>
      <text y="30" class="pattern-label" font-weight="bold">• Observer</text>
      <text y="60" class="pattern-label">• State</text>
      <text y="90" class="pattern-label">• Command</text>
      <text y="120" class="pattern-label">• Iterator</text>
      <text y="150" class="pattern-label">• Template Method</text>
    </g>
  </g>

</svg>