<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .island { fill: #E8F5E9; stroke: #43A047; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="300" class="bg"/>
  
  <text x="250" y="40" class="text-main" text-anchor="middle">多種多様なプログラミング・パラダイム</text>

  <!-- Islands -->
  <circle cx="120" cy="120" r="60" class="island" />
  <text x="120" y="125" class="text-main" text-anchor="middle">命令型</text>
  <text x="120" y="145" class="text-main" font-size="10" font-weight="normal" text-anchor="middle">C / Java</text>

  <circle cx="380" cy="120" r="60" class="island" style="fill: #E3F2FD; stroke: #1E88E5;" />
  <text x="380" y="125" class="text-main" text-anchor="middle">関数型</text>
  <text x="380" y="145" class="text-main" font-size="10" font-weight="normal" text-anchor="middle">Haskell / Lisp</text>

  <circle cx="250" cy="220" r="60" class="island" style="fill: #FFF3E0; stroke: #FB8C00;" />
  <text x="250" y="225" class="text-main" text-anchor="middle">マルチパラダイム</text>
  <text x="250" y="245" class="text-main" font-size="10" font-weight="normal" text-anchor="middle">Python / Rust</text>
</svg>