<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .scanner { stroke: #1E88E5; stroke-width: 2; fill: none; }
      .code-line { stroke: #CCC; stroke-width: 4; }
      .bug-found { fill: #D32F2F; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="300" class="bg"/>
  
  <text x="250" y="40" class="text-main" text-anchor="middle">静的解析ツールの鑑定眼</text>

  <!-- コード模倣 -->
  <line x1="100" y1="80" x2="300" y2="80" class="code-line" />
  <line x1="100" y1="110" x2="250" y2="110" class="code-line" />
  <line x1="100" y1="140" x2="350" y2="140" class="code-line" />
  <circle cx="280" cy="110" r="10" class="bug-found" /> <!-- 未定義変数とか -->
  <line x1="100" y1="170" x2="280" y2="170" class="code-line" />

  <!-- スキャナー -->
  <path d="M 50,100 Q 250,50 450,100" class="scanner" stroke-dasharray="5" />
  <text x="400" y="130" class="text-main" font-size="12" fill="#1E88E5">型チェック</text>
  <text x="400" y="150" class="text-main" font-size="12" fill="#1E88E5">Lint (作法)</text>
  <text x="400" y="170" class="text-main" font-size="12" fill="#1E88E5">複雑度計測</text>
</svg>