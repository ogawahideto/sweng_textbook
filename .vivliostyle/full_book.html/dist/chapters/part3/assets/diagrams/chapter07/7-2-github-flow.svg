<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .main-stream { stroke: #1E88E5; stroke-width: 6; fill: none; }
      .feature-branch { stroke: #43A047; stroke-width: 4; fill: none; stroke-dasharray: 6; }
      .node-commit { fill: #FFF; stroke: #333; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .pr-box { fill: #FFFDE7; stroke: #FBC02D; stroke-width: 1; }
    </style>
  </defs>

  <rect x="0" y="0" width="500" height="300" class="bg"/>
  <title>GitHub Flow</title>

  <!-- 本流 (Main River) -->
  <path d="M 50,200 L 450,200" class="main-stream" />
  <text x="50" y="230" class="text-main">Main (本流)</text>

  <!-- 枝分かれ (Feature Scout) -->
  <path d="M 150,200 C 180,100 320,100 350,200" class="feature-branch" />
  <text x="250" y="80" class="text-main" text-anchor="middle">Feature (斥候)</text>

  <!-- コミット点 -->
  <circle cx="200" cy="135" r="5" class="node-commit" />
  <circle cx="250" cy="115" r="5" class="node-commit" />
  <circle cx="300" cy="135" r="5" class="node-commit" />

  <!-- プルリクエスト (知の交流) -->
  <rect x="200" y="150" width="100" height="30" rx="5" class="pr-box" />
  <text x="250" y="170" class="text-main" font-size="10" text-anchor="middle">Pull Request (対話)</text>

  <!-- マージ -->
  <circle cx="350" cy="200" r="8" fill="#43A047" />
  <text x="365" y="230" class="text-main" font-size="12">Merge!</text>

</svg>