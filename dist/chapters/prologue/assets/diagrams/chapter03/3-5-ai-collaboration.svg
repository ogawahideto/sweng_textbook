<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .box-ai { fill: #F3E5F5; stroke: #8E24AA; stroke-width: 2; }
      .box-human { fill: #E3F2FD; stroke: #1E88E5; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#666" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="300" class="bg"/>
  
  <text x="250" y="40" class="text-main" text-anchor="middle">自律型エージェントとの二重詠唱</text>

  <!-- Human -->
  <rect x="50" y="100" width="120" height="60" rx="5" class="box-human" />
  <text x="110" y="135" class="text-main" text-anchor="middle">人間 (設計)</text>

  <!-- AI -->
  <rect x="330" y="100" width="120" height="60" rx="5" class="box-ai" />
  <text x="390" y="135" class="text-main" text-anchor="middle">AI (具現化)</text>

  <!-- Loop -->
  <path d="M 170,120 L 320,120" class="arrow" />
  <text x="245" y="110" class="text-main" font-size="10" text-anchor="middle">指示 (詠唱)</text>
  
  <path d="M 330,150 L 180,150" class="arrow" />
  <text x="245" y="175" class="text-main" font-size="10" text-anchor="middle">成果・フィードバック</text>
  
  <text x="250" y="230" class="text-main" text-anchor="middle" font-size="12">「指示」と「修正」の螺旋階段</text>
</svg>