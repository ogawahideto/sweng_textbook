<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="500" height="250">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .box { fill: #FFF; stroke-width: 2; rx: 10; ry: 10; }
      .box-static { stroke: #1E88E5; }
      .box-dynamic { stroke: #43A047; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #666; text-anchor: middle; }
      .arrow-dashed { stroke: #999; stroke-width: 2; stroke-dasharray: 5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#999" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="250" class="bg"/>
  
  <rect x="50" y="50" width="160" height="100" class="box box-static" />
  <text x="130" y="100" class="text-main">クラス図</text>
  <text x="130" y="125" class="text-sub">静的な構造（魔法陣）</text>

  <rect x="290" y="50" width="160" height="100" class="box box-dynamic" />
  <text x="370" y="100" class="text-main">シーケンス図</text>
  <text x="370" y="125" class="text-sub">動的な振る舞い（儀式）</text>

  <path d="M 210,80 L 280,80" class="arrow-dashed" />
  <text x="245" y="75" class="text-sub">構造を定義</text>

  <path d="M 290,120 L 220,120" class="arrow-dashed" />
  <text x="245" y="140" class="text-sub">役割を実証</text>
</svg>