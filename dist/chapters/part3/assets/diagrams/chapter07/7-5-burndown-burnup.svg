<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320">
  <rect width="680" height="320" fill="#FAFAFA" rx="8"/>

  <!-- ===== タイトル ===== -->
  <text x="340" y="22" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#333">バーンダウン（左）とバーンアップ（右）</text>

  <!-- ============================================================ -->
  <!-- LEFT: バーンダウンチャート -->
  <!-- ============================================================ -->
  <g transform="translate(30, 35)">
    <!-- 軸背景 -->
    <rect x="0" y="0" width="290" height="235" fill="white" stroke="#DDD" stroke-width="1" rx="4"/>
    <text x="145" y="18" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="#1565C0">バーンダウンチャート</text>

    <!-- グリッド線 -->
    <line x1="40" y1="30" x2="270" y2="30" stroke="#EEE" stroke-width="1"/>
    <line x1="40" y1="65" x2="270" y2="65" stroke="#EEE" stroke-width="1"/>
    <line x1="40" y1="100" x2="270" y2="100" stroke="#EEE" stroke-width="1"/>
    <line x1="40" y1="135" x2="270" y2="135" stroke="#EEE" stroke-width="1"/>
    <line x1="40" y1="170" x2="270" y2="170" stroke="#EEE" stroke-width="1"/>

    <!-- Y軸 -->
    <line x1="40" y1="25" x2="40" y2="195" stroke="#999" stroke-width="1.5"/>
    <!-- X軸 -->
    <line x1="40" y1="195" x2="275" y2="195" stroke="#999" stroke-width="1.5"/>

    <!-- Y軸ラベル -->
    <text x="35" y="33" text-anchor="end" font-family="monospace" font-size="9" fill="#666">50</text>
    <text x="35" y="68" text-anchor="end" font-family="monospace" font-size="9" fill="#666">40</text>
    <text x="35" y="103" text-anchor="end" font-family="monospace" font-size="9" fill="#666">30</text>
    <text x="35" y="138" text-anchor="end" font-family="monospace" font-size="9" fill="#666">20</text>
    <text x="35" y="173" text-anchor="end" font-family="monospace" font-size="9" fill="#666">10</text>
    <text x="35" y="198" text-anchor="end" font-family="monospace" font-size="9" fill="#666">0</text>
    <text x="5" y="120" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888" transform="rotate(-90 5 120)">残ポイント</text>

    <!-- X軸ラベル（日） -->
    <text x="40" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">0</text>
    <text x="80" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">2</text>
    <text x="120" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">4</text>
    <text x="160" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">6</text>
    <text x="200" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">8</text>
    <text x="240" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">10</text>
    <text x="155" y="220" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888">スプリント日数</text>

    <!-- 理想線（青破線）: 50→0を直線 -->
    <!-- 始点: x=40, y=30(50pt)  終点: x=240, y=195(0pt) -->
    <line x1="40" y1="30" x2="240" y2="195" stroke="#42A5F5" stroke-width="2" stroke-dasharray="6,3"/>

    <!-- 実績線（緑実線）: 50→45→40→38→38→38→25→18→10→5→3 -->
    <!-- y mapping: 50→30, 40→100, 30→135, 20→170, 10→173+17=?, 0→195 -->
    <!-- scale: 50pt = 165px → 1pt = 3.3px → y = 195 - pt*3.3 -->
    <!-- pt: 50,45,40,38,38,38,25,18,10,5,3 -->
    <!-- y:  30,45.5,63,68.6,68.6,68.6,112.5,136.6,162,178.5,185.1 -->
    <polyline
      points="40,30 80,45 120,63 160,69 200,69 240,113"
      fill="none" stroke="#E53935" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- 平坦区間のハイライト -->
    <rect x="120" y="58" width="80" height="22" fill="#FFF3E0" opacity="0.7" rx="3"/>
    <text x="160" y="70" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="8" fill="#E65100">ブロッカー発生</text>

    <!-- 凡例 -->
    <line x1="55" y1="228" x2="80" y2="228" stroke="#42A5F5" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="83" y="231" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#555">理想線</text>
    <line x1="145" y1="228" x2="170" y2="228" stroke="#E53935" stroke-width="2.5"/>
    <text x="173" y="231" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#555">実績</text>
  </g>

  <!-- ============================================================ -->
  <!-- RIGHT: バーンアップチャート -->
  <!-- ============================================================ -->
  <g transform="translate(360, 35)">
    <rect x="0" y="0" width="290" height="235" fill="white" stroke="#DDD" stroke-width="1" rx="4"/>
    <text x="145" y="18" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" font-weight="bold" fill="#2E7D32">バーンアップチャート</text>

    <!-- グリッド線 -->
    <line x1="40" y1="30" x2="270" y2="30" stroke="#EEE" stroke-width="1"/>
    <line x1="40" y1="65" x2="270" y2="65" stroke="#EEE" stroke-width="1"/>
    <line x1="40" y1="100" x2="270" y2="100" stroke="#EEE" stroke-width="1"/>
    <line x1="40" y1="135" x2="270" y2="135" stroke="#EEE" stroke-width="1"/>
    <line x1="40" y1="170" x2="270" y2="170" stroke="#EEE" stroke-width="1"/>

    <!-- Y軸 -->
    <line x1="40" y1="25" x2="40" y2="195" stroke="#999" stroke-width="1.5"/>
    <!-- X軸 -->
    <line x1="40" y1="195" x2="275" y2="195" stroke="#999" stroke-width="1.5"/>

    <!-- Y軸ラベル -->
    <text x="35" y="33" text-anchor="end" font-family="monospace" font-size="9" fill="#666">50</text>
    <text x="35" y="68" text-anchor="end" font-family="monospace" font-size="9" fill="#666">40</text>
    <text x="35" y="103" text-anchor="end" font-family="monospace" font-size="9" fill="#666">30</text>
    <text x="35" y="138" text-anchor="end" font-family="monospace" font-size="9" fill="#666">20</text>
    <text x="35" y="173" text-anchor="end" font-family="monospace" font-size="9" fill="#666">10</text>
    <text x="35" y="198" text-anchor="end" font-family="monospace" font-size="9" fill="#666">0</text>
    <text x="5" y="120" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888" transform="rotate(-90 5 120)">完了ポイント</text>

    <!-- X軸ラベル -->
    <text x="40" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">0</text>
    <text x="80" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">2</text>
    <text x="120" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">4</text>
    <text x="160" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">6</text>
    <text x="200" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">8</text>
    <text x="240" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">10</text>
    <text x="155" y="220" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#888">スプリント日数</text>

    <!-- スコープ線（オレンジ）: day0=50、day6に65（スコープ追加）で増加 -->
    <!-- y = 195 - pt*3.3 -->
    <!-- 50→30, 65→-9.5→capped at top -->
    <polyline points="40,30 160,30 160,8 240,8" fill="none" stroke="#FB8C00" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- スコープ追加の注記 -->
    <text x="161" y="7" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="8" fill="#E65100">スコープ追加</text>
    <line x1="160" y1="8" x2="160" y2="30" stroke="#FB8C00" stroke-width="1.5" stroke-dasharray="2,2"/>

    <!-- 完了線（緑実線）: 0→5→12→18→22→28→32→37 -->
    <!-- pt: 0,5,12,18,22,28,32,37 -->
    <!-- y: 195, 178.5, 155.4, 135.6, 122.4, 102.6, 89.4, 72.9 -->
    <polyline
      points="40,195 80,179 120,155 160,136 200,123 240,90"
      fill="none" stroke="#43A047" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- 面積を塗る（完了エリア） -->
    <polygon
      points="40,195 80,179 120,155 160,136 200,123 240,90 240,195"
      fill="#E8F5E9" opacity="0.6"/>

    <!-- 凡例 -->
    <line x1="45" y1="228" x2="70" y2="228" stroke="#FB8C00" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="73" y="231" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#555">スコープ</text>
    <line x1="155" y1="228" x2="180" y2="228" stroke="#43A047" stroke-width="2.5"/>
    <text x="183" y="231" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#555">完了量</text>
  </g>

  <!-- ===== 下部注記 ===== -->
  <text x="340" y="308" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#AAA">バーンダウン: 残作業を減らす視点 ／ バーンアップ: 完了量とスコープ変動を同時に可視化</text>
</svg>
