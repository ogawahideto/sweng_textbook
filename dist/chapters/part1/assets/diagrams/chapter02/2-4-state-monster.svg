<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .class-box { fill: #FFF; stroke: #333; stroke-width: 2; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-attr { font-family: 'monospace'; font-size: 12px; fill: #333; }
      .arrow-gen { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow-tri); }
    </style>
    <marker id="arrow-tri" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon fill="none" stroke="#333" points="0 0, 10 5, 0 10" />
    </marker>
  </defs>
  <rect x="0" y="0" width="600" height="300" class="bg"/>

  <!-- Monster -->
  <rect x="50" y="50" width="120" height="80" class="class-box" />
  <line x1="50" y1="75" x2="170" y2="75" stroke="#333" />
  <text x="110" y="68" class="text-title">Monster</text>
  <text x="60" y="95" class="text-attr">-state: State</text>
  <line x1="50" y1="105" x2="170" y2="105" stroke="#333" />
  <text x="60" y="120" class="text-attr">+act()</text>

  <!-- State Interface -->
  <rect x="300" y="50" width="150" height="60" class="class-box" style="stroke-dasharray: 4;" />
  <text x="375" y="85" class="text-title">«interface»<br/>State</text>

  <!-- Concrete States -->
  <rect x="200" y="180" width="100" height="40" class="class-box" />
  <text x="250" y="205" class="text-title">IdleState</text>

  <rect x="325" y="180" width="100" height="40" class="class-box" />
  <text x="375" y="205" class="text-title">ChaseState</text>

  <rect x="450" y="180" width="100" height="40" class="class-box" />
  <text x="500" y="205" class="text-title">AttackState</text>

  <!-- Relations -->
  <line x1="170" y1="90" x2="300" y2="90" stroke="#333" stroke-width="1.5" />
  <circle cx="295" cy="90" r="4" fill="none" stroke="#333" /> <!-- Aggregation (o--) -->
  <text x="220" y="85" font-size="10">state</text>

  <path d="M 250,180 L 375,110" class="arrow-gen" style="stroke-dasharray: 2;" />
  <path d="M 375,180 L 375,110" class="arrow-gen" style="stroke-dasharray: 2;" />
  <path d="M 500,180 L 375,110" class="arrow-gen" style="stroke-dasharray: 2;" />
</svg>