<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250">
  <defs>
    <style>
      .step-rect { fill: #FAFAFA; stroke: #333; stroke-width: 2; rx: 5; ry: 5; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666; text-anchor: middle; }
      .arrow { stroke: #4A90D9; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .check { fill: #43A047; font-family: sans-serif; font-weight: bold; font-size: 20px; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#4A90D9" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>CI パイプライン</title>
  <rect x="0" y="0" width="700" height="250" fill="#FAFAFA"/>

  <!-- Step 1: Push -->
  <g transform="translate(60, 120)">
    <rect x="-50" y="-40" width="100" height="80" class="step-rect" />
    <text x="0" y="-5" class="text-title">Push</text>
    <text x="0" y="15" class="text-sub">Git コミット</text>
  </g>
  <path d="M 110 120 L 150 120" class="arrow" />

  <!-- Step 2: Build -->
  <g transform="translate(210, 120)">
    <rect x="-50" y="-40" width="100" height="80" class="step-rect" />
    <text x="0" y="-5" class="text-title">Build</text>
    <text x="0" y="15" class="text-sub">環境構築</text>
  </g>
  <path d="M 260 120 L 300 120" class="arrow" />

  <!-- Step 3: Lint/Type -->
  <g transform="translate(360, 120)">
    <rect x="-50" y="-40" width="100" height="80" class="step-rect" />
    <text x="0" y="-5" class="text-title">Static Analysis</text>
    <text x="0" y="15" class="text-sub">Lint, Mypy</text>
  </g>
  <path d="M 410 120 L 450 120" class="arrow" />

  <!-- Step 4: Test -->
  <g transform="translate(510, 120)">
    <rect x="-50" y="-40" width="100" height="80" class="step-rect" />
    <text x="0" y="-5" class="text-title">Test</text>
    <text x="0" y="15" class="text-sub">Pytest</text>
  </g>
  <path d="M 560 120 L 600 120" class="arrow" />

  <!-- Result -->
  <g transform="translate(650, 120)">
    <circle cx="0" cy="0" r="30" fill="#E8F5E9" stroke="#43A047" stroke-width="2" />
    <text x="0" y="8" class="check">✓</text>
    <text x="0" y="45" class="text-title">Success</text>
  </g>

</svg>