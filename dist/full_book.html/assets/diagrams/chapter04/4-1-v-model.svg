<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <style>
      .node { fill: #FFF; stroke: #333; stroke-width: 2; rx: 5; ry: 5; }
      .text-node { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; fill: #333; text-anchor: middle; }
      .line-v { stroke: #4A90D9; stroke-width: 3; fill: none; }
      .line-h { stroke: #999; stroke-width: 1.5; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
      .label-h { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; fill: #4A90D9; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#999" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>V字モデル</title>
  <rect x="0" y="0" width="600" height="450" fill="#FAFAFA"/>

  <!-- V字の線 -->
  <path d="M 100 50 L 300 350 L 500 50" class="line-v" />

  <!-- 左側: 開発工程 -->
  <g transform="translate(100, 50)">
    <rect x="-60" y="-20" width="120" height="40" class="node" />
    <text x="0" y="5" class="text-node">要求定義</text>
  </g>
  <g transform="translate(150, 125)">
    <rect x="-60" y="-20" width="120" height="40" class="node" />
    <text x="0" y="5" class="text-node">基本設計</text>
  </g>
  <g transform="translate(200, 200)">
    <rect x="-60" y="-20" width="120" height="40" class="node" />
    <text x="0" y="5" class="text-node">詳細設計</text>
  </g>
  <g transform="translate(250, 275)">
    <rect x="-60" y="-20" width="120" height="40" class="node" />
    <text x="0" y="5" class="text-node">実装</text>
  </g>

  <!-- 右側: テスト工程 -->
  <g transform="translate(500, 50)">
    <rect x="-60" y="-20" width="120" height="40" class="node" />
    <text x="0" y="5" class="text-node">受入テスト</text>
  </g>
  <g transform="translate(450, 125)">
    <rect x="-60" y="-20" width="120" height="40" class="node" />
    <text x="0" y="5" class="text-node">システムテスト</text>
  </g>
  <g transform="translate(400, 200)">
    <rect x="-60" y="-20" width="120" height="40" class="node" />
    <text x="0" y="5" class="text-node">結合テスト</text>
  </g>
  <g transform="translate(350, 275)">
    <rect x="-60" y="-20" width="120" height="40" class="node" />
    <text x="0" y="5" class="text-node">単体テスト</text>
  </g>

  <!-- 水平の対応線 -->
  <line x1="160" y1="50" x2="440" y2="50" class="line-h" />
  <line x1="210" y1="125" x2="390" y2="125" class="line-h" />
  <line x1="260" y1="200" x2="340" y2="200" class="line-h" />
  <line x1="310" y1="275" x2="290" y2="275" class="line-h" /> <!-- 実装-単体は近い -->

  <text x="300" y="40" class="label-h">検証対象の対応</text>

</svg>