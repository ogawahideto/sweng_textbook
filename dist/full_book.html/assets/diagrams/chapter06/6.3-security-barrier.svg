<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .layer { fill-opacity: 0.1; stroke-width: 2; stroke-dasharray: 5; }
      .core { fill: #FFF3E0; stroke: #FB8C00; stroke-width: 3; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="400" class="bg"/>
  
  <!-- 多層防御 -->
  <circle cx="250" cy="200" r="180" class="layer" style="fill: #E3F2FD; stroke: #1E88E5;" />
  <text x="250" y="45" class="text-main" fill="#1E88E5">ネットワーク境界 (Firewall)</text>

  <circle cx="250" cy="200" r="130" class="layer" style="fill: #E8F5E9; stroke: #43A047;" />
  <text x="250" y="95" class="text-main" fill="#43A047">認証・認可 (Auth)</text>

  <circle cx="250" cy="200" r="80" class="layer" style="fill: #F3E5F5; stroke: #8E24AA;" />
  <text x="250" y="145" class="text-main" fill="#8E24AA">アプリケーション防御 (Validation)</text>

  <!-- Core -->
  <circle cx="250" cy="200" r="30" class="core" />
  <text x="250" y="205" class="text-main">重要データ</text>
</svg>