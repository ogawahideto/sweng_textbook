<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style>
      .ring { fill-opacity: 0.8; stroke: #FFF; stroke-width: 2; }
      .ring-blue { fill: #81D4FA; } /* Frameworks */
      .ring-green { fill: #A5D6A7; } /* Interface Adapters */
      .ring-red { fill: #EF9A9A; } /* Use Cases */
      .ring-yellow { fill: #FFF59D; } /* Entities */
      .label { font-family: 'Noto Sans JP', sans-serif; font-weight: bold; fill: #333; text-anchor: middle; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#333" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>クリーンアーキテクチャ</title>

  <!-- 中心点 (300, 300) -->

  <!-- Frameworks (Blue) - 最外周 -->
  <circle cx="300" cy="300" r="280" class="ring ring-blue" />
  <text x="300" y="60" class="label" font-size="14">Frameworks &amp; Drivers</text>
  <text x="300" y="80" class="label" font-size="12">Web, DB, Devices, UI</text>

  <!-- Interface Adapters (Green) -->
  <circle cx="300" cy="300" r="200" class="ring ring-green" />
  <text x="300" y="140" class="label" font-size="14">Interface Adapters</text>
  <text x="300" y="160" class="label" font-size="12">Controllers, Gateways, Presenters</text>

  <!-- Use Cases (Red) -->
  <circle cx="300" cy="300" r="130" class="ring ring-red" />
  <text x="300" y="210" class="label" font-size="14">Application Business Rules</text>
  <text x="300" y="230" class="label" font-size="12">(Use Cases)</text>

  <!-- Entities (Yellow) - 中心 -->
  <circle cx="300" cy="300" r="70" class="ring ring-yellow" />
  <text x="300" y="295" class="label" font-size="14">Enterprise</text>
  <text x="300" y="315" class="label" font-size="14">Business Rules</text>
  <text x="300" y="335" class="label" font-size="12">(Entities)</text>

  <!-- 依存方向の矢印 (Dependency Rule) -->
  <!-- 左側 -->
  <path d="M 40 300 L 100 300" class="arrow" />
  <path d="M 120 300 L 170 300" class="arrow" />
  <path d="M 190 300 L 230 300" class="arrow" />

</svg>