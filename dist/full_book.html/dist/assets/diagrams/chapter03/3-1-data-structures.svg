<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <defs>
    <style>
      .rack-box { fill: #E3F2FD; stroke: #4A90D9; stroke-width: 2; }
      .index-box { fill: #FFF3E0; stroke: #FFB74D; stroke-width: 2; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-desc { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #555; text-anchor: middle; }
      .item { fill: #FFF; stroke: #999; }
    </style>
  </defs>

  <title>巻物棚 vs 索引目録</title>
  <rect x="0" y="0" width="600" height="350" fill="#FAFAFA"/>

  <!-- 配列: 巻物棚 (左) -->
  <g transform="translate(50, 50)">
    <text x="110" y="0" class="text-title">配列（巻物棚）</text>
    <rect x="0" y="20" width="220" height="150" class="rack-box" rx="5"/>
    <!-- 棚の仕切り -->
    <line x1="0" y1="70" x2="220" y2="70" stroke="#4A90D9" stroke-width="1"/>
    <line x1="0" y1="120" x2="220" y2="120" stroke="#4A90D9" stroke-width="1"/>
    <line x1="55" y1="20" x2="55" y2="170" stroke="#4A90D9" stroke-width="1"/>
    <line x1="110" y1="20" x2="110" y2="170" stroke="#4A90D9" stroke-width="1"/>
    <line x1="165" y1="20" x2="165" y2="170" stroke="#4A90D9" stroke-width="1"/>
    <text x="110" y="190" class="text-desc">番号で引くのは速い O(1)</text>
    <text x="110" y="210" class="text-desc">中身を探すのは大変 O(N)</text>
  </g>

  <!-- ハッシュマップ: 索引 (右) -->
  <g transform="translate(330, 50)">
    <text x="110" y="0" class="text-title">連想配列（索引）</text>
    <rect x="0" y="20" width="220" height="150" class="index-box" rx="5"/>
    <!-- カードの重なり -->
    <rect x="40" y="40" width="140" height="100" class="item" rx="3"/>
    <rect x="50" y="50" width="140" height="100" class="item" rx="3"/>
    <rect x="60" y="60" width="140" height="100" class="item" rx="3"/>
    <text x="130" y="85" class="text-desc" font-weight="bold">火 → 棚[5]</text>
    <text x="110" y="190" class="text-desc">名前（キー）で引けば</text>
    <text x="110" y="210" class="text-desc">どこでも一瞬 O(1)</text>
  </g>

</svg>