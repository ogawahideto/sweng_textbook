<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <defs>
    <style>
      .box { fill: #FFF; stroke: #333; stroke-width: 2; rx: 5; ry: 5; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-body { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #666; text-anchor: middle; }
      .arrow { stroke: #E57373; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-blue { stroke: #4A90D9; stroke-width: 3; fill: none; marker-end: url(#arrowhead-blue); }
      .interface { fill: #E8F5E9; stroke: #81C784; stroke-width: 2; rx: 20; ry: 20; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#E57373" points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#4A90D9" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>依存逆転の原則 (DIP)</title>
  <rect x="0" y="0" width="600" height="350" fill="#FAFAFA"/>

  <!-- Before (左) -->
  <g transform="translate(50, 50)">
    <text x="100" y="-10" class="text-title">従来の依存 (密結合)</text>
    <rect x="30" y="20" width="140" height="50" class="box" />
    <text x="100" y="50" class="text-body">上位: UseCase</text>
    
    <path d="M 100 70 L 100 130" class="arrow" />
    
    <rect x="30" y="150" width="140" height="50" class="box" />
    <text x="100" y="180" class="text-body">下位: MySQL_DB</text>
    <text x="100" y="230" class="text-body" fill="#E57373">下位の詳細が変わると<br/>上位も壊れる</text>
  </g>

  <!-- After (右) -->
  <g transform="translate(350, 50)">
    <text x="125" y="-10" class="text-title">依存逆転 (DIP)</text>
    <rect x="55" y="20" width="140" height="50" class="box" />
    <text x="125" y="50" class="text-body">上位: UseCase</text>
    
    <path d="M 125 70 L 125 110" class="arrow-blue" />
    
    <!-- インターフェース (抽象) -->
    <rect x="45" y="120" width="160" height="50" class="interface" />
    <text x="125" y="150" class="text-body" font-weight="bold">I_Repository</text>
    
    <path d="M 125 220 L 125 180" class="arrow-blue" /> <!-- 下位が抽象に依存（逆転） -->
    
    <rect x="55" y="230" width="140" height="50" class="box" />
    <text x="125" y="260" class="text-body">下位: MySQL_DB</text>
    <text x="125" y="310" class="text-body" fill="#4A90D9">双方が「抽象」に依存。<br/>詳細の変更に強い！</text>
  </g>

</svg>