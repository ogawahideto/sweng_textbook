<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <defs>
    <style>
      .lbl { font-family: 'Noto Sans JP', 'Hiragino Sans', 'Meiryo', sans-serif; fill: #333; }
      .mono { font-family: 'Courier New', 'Consolas', monospace; }
    </style>
    <marker id="arr-chaos" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#E53935" opacity="0.55"/>
    </marker>
    <marker id="arr-clean" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#1565C0"/>
    </marker>
  </defs>

  <title>手続き型 vs オブジェクト指向</title>

  <!-- 全体背景 -->
  <rect width="800" height="430" fill="#FAFAFA" rx="12"/>

  <!-- タイトル -->
  <text x="400" y="32" text-anchor="middle" class="lbl" font-size="16" font-weight="bold" fill="#222">手続き型の迷宮　vs　オブジェクト指向の秩序</text>

  <!-- 左エリア背景 -->
  <rect x="10" y="46" width="378" height="360" fill="#FFF8F8" stroke="#FFCCBC" stroke-width="1.5" rx="10"/>
  <!-- 右エリア背景 -->
  <rect x="412" y="46" width="378" height="360" fill="#F5F9FF" stroke="#BBDEFB" stroke-width="1.5" rx="10"/>

  <!-- vs -->
  <text x="400" y="232" text-anchor="middle" class="lbl" font-size="20" font-weight="bold" fill="#999">vs</text>

  <!-- ===== 左：手続き型 ===== -->
  <text x="199" y="68" text-anchor="middle" class="lbl" font-size="13" font-weight="bold" fill="#C62828">⚠ 手続き型（データと処理がバラバラ）</text>

  <!-- 変数ボックス群 -->
  <rect x="22"  y="84"  width="118" height="26" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5" rx="4"/>
  <text x="81"  y="102" text-anchor="middle" class="lbl mono" font-size="11" fill="#BF360C">勇者HP = 100</text>

  <rect x="228" y="108" width="118" height="26" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5" rx="4"/>
  <text x="287" y="126" text-anchor="middle" class="lbl mono" font-size="11" fill="#BF360C">勇者MP = 50</text>

  <rect x="45"  y="168" width="118" height="26" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5" rx="4"/>
  <text x="104" y="186" text-anchor="middle" class="lbl mono" font-size="11" fill="#BF360C">敵HP = 200</text>

  <rect x="215" y="196" width="138" height="26" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5" rx="4"/>
  <text x="284" y="214" text-anchor="middle" class="lbl mono" font-size="11" fill="#BF360C">敵名 = "ドラゴン"</text>

  <!-- 関数ボックス群 -->
  <rect x="22"  y="260" width="128" height="26" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="4"/>
  <text x="86"  y="278" text-anchor="middle" class="lbl mono" font-size="11" fill="#1A237E">attack(target)</text>

  <rect x="200" y="290" width="118" height="26" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="4"/>
  <text x="259" y="308" text-anchor="middle" class="lbl mono" font-size="11" fill="#1A237E">heal(target)</text>

  <rect x="38"  y="342" width="148" height="26" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="4"/>
  <text x="112" y="360" text-anchor="middle" class="lbl mono" font-size="11" fill="#1A237E">calc_damage(a, b)</text>

  <!-- カオスな矢印 -->
  <line x1="140" y1="97"  x2="228" y2="114" stroke="#E53935" stroke-width="1"   opacity="0.45" marker-end="url(#arr-chaos)"/>
  <line x1="81"  y1="110" x2="75"  y2="164" stroke="#E53935" stroke-width="1"   opacity="0.45" marker-end="url(#arr-chaos)"/>
  <line x1="163" y1="181" x2="215" y2="202" stroke="#E53935" stroke-width="1"   opacity="0.45" marker-end="url(#arr-chaos)"/>
  <line x1="86"  y1="260" x2="104" y2="194" stroke="#E53935" stroke-width="1"   opacity="0.45" marker-end="url(#arr-chaos)"/>
  <line x1="150" y1="273" x2="200" y2="300" stroke="#E53935" stroke-width="1"   opacity="0.45" marker-end="url(#arr-chaos)"/>
  <line x1="259" y1="273" x2="284" y2="196" stroke="#E53935" stroke-width="1"   opacity="0.45" marker-end="url(#arr-chaos)"/>
  <line x1="112" y1="342" x2="60"  y2="110" stroke="#E53935" stroke-width="1"   opacity="0.35" marker-end="url(#arr-chaos)"/>
  <line x1="186" y1="355" x2="259" y2="316" stroke="#E53935" stroke-width="1"   opacity="0.45" marker-end="url(#arr-chaos)"/>

  <!-- 凡例（左） -->
  <rect x="25" y="390" width="12" height="12" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5" rx="2"/>
  <text x="42" y="401" class="lbl" font-size="11" fill="#555">変数（データ）</text>
  <rect x="130" y="390" width="12" height="12" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="2"/>
  <text x="147" y="401" class="lbl" font-size="11" fill="#555">関数（処理）</text>

  <!-- ===== 右：オブジェクト指向 ===== -->
  <text x="601" y="68" text-anchor="middle" class="lbl" font-size="13" font-weight="bold" fill="#1565C0">✓ オブジェクト指向（カプセルに封じ込める）</text>

  <!-- 勇者クラス -->
  <rect x="420" y="84" width="162" height="148" fill="white" stroke="#1565C0" stroke-width="2" rx="8"/>
  <!-- ヘッダー -->
  <rect x="420" y="84" width="162" height="30" fill="#1565C0" rx="8"/>
  <rect x="420" y="100" width="162" height="14" fill="#1565C0"/>
  <text x="501" y="105" text-anchor="middle" class="lbl" font-size="13" font-weight="bold" fill="white">⚔ 勇者クラス</text>
  <!-- 属性 -->
  <text x="432" y="130" class="lbl" font-size="9" fill="#999">〈属性〉</text>
  <text x="432" y="146" class="lbl mono" font-size="11" fill="#1565C0">HP = 100</text>
  <text x="432" y="162" class="lbl mono" font-size="11" fill="#1565C0">MP = 50</text>
  <!-- 区切り線 -->
  <line x1="426" y1="170" x2="576" y2="170" stroke="#BBDEFB" stroke-width="1"/>
  <!-- 操作 -->
  <text x="432" y="184" class="lbl" font-size="9" fill="#999">〈操作〉</text>
  <text x="432" y="200" class="lbl mono" font-size="11" fill="#283593">attack()</text>
  <text x="432" y="216" class="lbl mono" font-size="11" fill="#283593">heal()</text>
  <text x="432" y="224" class="lbl mono" font-size="11" fill="#283593"> </text>

  <!-- 敵クラス -->
  <rect x="610" y="84" width="170" height="148" fill="white" stroke="#C62828" stroke-width="2" rx="8"/>
  <!-- ヘッダー -->
  <rect x="610" y="84" width="170" height="30" fill="#C62828" rx="8"/>
  <rect x="610" y="100" width="170" height="14" fill="#C62828"/>
  <text x="695" y="105" text-anchor="middle" class="lbl" font-size="13" font-weight="bold" fill="white">🐉 敵クラス</text>
  <!-- 属性 -->
  <text x="622" y="130" class="lbl" font-size="9" fill="#999">〈属性〉</text>
  <text x="622" y="146" class="lbl mono" font-size="11" fill="#C62828">HP = 200</text>
  <text x="622" y="162" class="lbl mono" font-size="11" fill="#C62828">名前 = "竜"</text>
  <!-- 区切り線 -->
  <line x1="616" y1="170" x2="774" y2="170" stroke="#FFCDD2" stroke-width="1"/>
  <!-- 操作 -->
  <text x="622" y="184" class="lbl" font-size="9" fill="#999">〈操作〉</text>
  <text x="622" y="200" class="lbl mono" font-size="11" fill="#7B1FA2">attack()</text>
  <text x="622" y="216" class="lbl mono" font-size="11" fill="#7B1FA2">breath()</text>

  <!-- クラス間のメッセージ矢印 -->
  <line x1="582" y1="157" x2="608" y2="157" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-clean)"/>
  <text x="595" y="150" text-anchor="middle" class="lbl" font-size="9" fill="#1565C0">attack()</text>

  <!-- 解説ボックス -->
  <rect x="420" y="254" width="360" height="136" fill="white" stroke="#BBDEFB" stroke-width="1.5" rx="8"/>
  <text x="600" y="276" text-anchor="middle" class="lbl" font-size="12" font-weight="bold" fill="#1565C0">なぜ良いのか？</text>
  <line x1="430" y1="282" x2="770" y2="282" stroke="#BBDEFB" stroke-width="1"/>

  <text x="435" y="300" class="lbl" font-size="12" fill="#333">● データ（属性）と処理（操作）がひとつのクラスに</text>
  <text x="435" y="320" class="lbl" font-size="12" fill="#333">　 まとまり、外部から守られている（カプセル化）</text>
  <text x="435" y="342" class="lbl" font-size="12" fill="#333">● 各オブジェクトが自律的に振る舞うため、</text>
  <text x="435" y="362" class="lbl" font-size="12" fill="#333">　 どこで何が起きるかが追跡しやすい</text>

  <!-- キャプション -->
  <text x="199" y="416" text-anchor="middle" class="lbl" font-size="11" fill="#C62828" font-style="italic">データと処理が絡み合い、追跡が複雑になりやすい</text>
  <text x="601" y="402" text-anchor="middle" class="lbl" font-size="11" fill="#1565C0" font-style="italic">関係が明確で、修正・拡張がしやすい</text>
</svg>
