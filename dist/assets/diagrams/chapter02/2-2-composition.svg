<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .class-box { fill: #FFF; stroke: #333; stroke-width: 2; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-attr { font-family: 'monospace'; font-size: 12px; fill: #333; }
      .comp-diamond { fill: #333; stroke: #333; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="200" class="bg"/>

  <!-- Hero -->
  <rect x="50" y="50" width="100" height="100" class="class-box" />
  <text x="100" y="80" class="text-title">Hero</text>

  <!-- Badge -->
  <rect x="300" y="50" width="150" height="100" class="class-box" />
  <line x1="300" y1="75" x2="450" y2="75" stroke="#333" />
  <text x="375" y="68" class="text-title">Badge</text>
  <text x="310" y="95" class="text-attr">+name: String</text>
  <text x="310" y="115" class="text-attr">+description: String</text>
  <line x1="300" y1="125" x2="450" y2="125" stroke="#333" />
  <text x="310" y="140" class="text-attr">+check_condition()</text>

  <!-- Composition Relation -->
  <line x1="150" y1="100" x2="300" y2="100" stroke="#333" stroke-width="1.5" />
  <polygon points="150,100 160,95 170,100 160,105" class="comp-diamond" />
  <text x="180" y="95" font-size="10">1</text>
  <text x="285" y="95" font-size="10">*</text>
  <text x="225" y="120" class="text-title" font-size="10">獲得済み</text>
</svg>