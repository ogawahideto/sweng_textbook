<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <style>
      .map-bg { fill: #FDF5E6; stroke: #D2B48C; stroke-width: 3; }
      .path { stroke: #8B4513; stroke-width: 2; stroke-dasharray: 8; fill: none; }
      .node-circle { fill: #FFF; stroke: #8B4513; stroke-width: 2; }
      .text-num { font-family: 'serif'; font-size: 14px; font-weight: bold; fill: #8B4513; text-anchor: middle; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #333; }
      .title-main { font-family: 'Noto Sans JP', sans-serif; font-size: 18px; font-weight: bold; fill: #8B4513; text-anchor: middle; }
    </style>
  </defs>
  <rect x="10" y="10" width="580" height="360" rx="15" class="map-bg" />
  <text x="300" y="45" class="title-main">第7章：冒険の地図（チーミングと開発プロセス）</text>

  <path d="M 100,100 L 250,80 L 400,100 L 450,190 L 300,270 L 150,270 L 100,190" class="path" />

  <g transform="translate(100, 100)">
    <circle r="15" class="node-circle" />
    <text y="5" class="text-num">7.1</text>
    <text x="-40" y="35" class="text-title" text-anchor="middle">スクラムの祝祭</text>
  </g>
  <g transform="translate(250, 80)">
    <circle r="15" class="node-circle" />
    <text y="5" class="text-num">7.2</text>
    <text x="0" y="35" class="text-title" text-anchor="middle">Gitを通じた知の交流</text>
  </g>
  <g transform="translate(400, 100)">
    <circle r="15" class="node-circle" />
    <text y="5" class="text-num">7.3</text>
    <text x="20" y="5" class="text-title">共鳴する魂</text>
  </g>
  <g transform="translate(450, 190)">
    <circle r="15" class="node-circle" style="stroke: #D32F2F;" />
    <text y="5" class="text-num" style="fill: #D32F2F;">7.4</text>
    <text x="-110" y="30" class="text-title" style="font-weight: bold;">【外伝】冒険者のギルド</text>
  </g>
  <g transform="translate(300, 270)">
    <circle r="15" class="node-circle" />
    <text y="5" class="text-num">7.5</text>
    <text x="0" y="30" class="text-title" text-anchor="middle">プロジェクト管理</text>
  </g>
  <g transform="translate(150, 270)">
    <circle r="15" class="node-circle" />
    <text y="5" class="text-num">7.6</text>
    <text x="0" y="30" class="text-title" text-anchor="middle">チーム設計とコンウェイの法則</text>
  </g>
</svg>