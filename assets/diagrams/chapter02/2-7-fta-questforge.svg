<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 345" width="640" height="345">
  <rect width="640" height="345" fill="#FAFAFA" rx="8"/>

  <!-- ===== トップ事象 ===== -->
  <rect x="150" y="18" width="340" height="42" fill="#FFEBEE" stroke="#C62828" stroke-width="2.5" rx="8"/>
  <text x="320" y="35" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#B71C1C">【トップ事象】</text>
  <text x="320" y="52" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#333">クエスト完了の失敗</text>

  <!-- トップ事象→ORゲート -->
  <line x1="320" y1="60" x2="320" y2="76" stroke="#555" stroke-width="1.5"/>

  <!-- ORゲート -->
  <circle cx="320" cy="89" r="14" fill="#E53935" stroke="none"/>
  <text x="320" y="94" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">OR</text>

  <!-- ORゲート→横バー -->
  <line x1="320" y1="103" x2="320" y2="114" stroke="#555" stroke-width="1.5"/>

  <!-- 横バー（3分岐） -->
  <line x1="110" y1="114" x2="530" y2="114" stroke="#555" stroke-width="1.5"/>

  <!-- 各分岐縦線 -->
  <line x1="120" y1="114" x2="120" y2="126" stroke="#555" stroke-width="1.5"/>
  <line x1="320" y1="114" x2="320" y2="126" stroke="#555" stroke-width="1.5"/>
  <line x1="520" y1="114" x2="520" y2="126" stroke="#555" stroke-width="1.5"/>

  <!-- ===== 左子: DBが応答しない（単点故障） ===== -->
  <rect x="36" y="126" width="168" height="58" fill="#FFCDD2" stroke="#E53935" stroke-width="2.5" rx="8"/>
  <text x="120" y="148" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">❶ DBが</text>
  <text x="120" y="166" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">応答しない</text>
  <text x="120" y="180" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#C62828">⚠ 単点故障</text>

  <!-- ===== 中央子: 経験値計算エラー（ANDゲート） ===== -->
  <rect x="236" y="126" width="168" height="58" fill="#FFF3E0" stroke="#F57C00" stroke-width="2" rx="8"/>
  <text x="320" y="148" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">❷ 経験値</text>
  <text x="320" y="166" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">計算エラー</text>
  <text x="320" y="180" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#E65100">AND条件（複合故障）</text>

  <!-- ===== 右子: 外部APIタイムアウト（単点故障） ===== -->
  <rect x="436" y="126" width="168" height="58" fill="#FFCDD2" stroke="#E53935" stroke-width="2.5" rx="8"/>
  <text x="520" y="148" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">❸ 外部API</text>
  <text x="520" y="166" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">タイムアウト</text>
  <text x="520" y="180" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#C62828">⚠ 単点故障</text>

  <!-- ===== 中央子の続き: ANDゲートへ ===== -->
  <line x1="320" y1="184" x2="320" y2="200" stroke="#555" stroke-width="1.5"/>

  <!-- ANDゲート -->
  <rect x="304" y="200" width="32" height="24" fill="#F57C00" stroke="none" rx="4"/>
  <text x="320" y="216" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">AND</text>

  <!-- ANDゲート→横バー -->
  <line x1="320" y1="224" x2="320" y2="236" stroke="#555" stroke-width="1.5"/>

  <!-- AND横バー -->
  <line x1="222" y1="236" x2="418" y2="236" stroke="#555" stroke-width="1.5"/>

  <!-- AND横バー→各入力 -->
  <line x1="232" y1="236" x2="232" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="408" y1="236" x2="408" y2="250" stroke="#555" stroke-width="1.5"/>

  <!-- AND入力左: キャッシュ破損 -->
  <rect x="152" y="250" width="160" height="48" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5" rx="6"/>
  <text x="232" y="269" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">レベルテーブルの</text>
  <text x="232" y="286" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">キャッシュ破損</text>

  <!-- AND入力右: 整数オーバーフロー -->
  <rect x="328" y="250" width="160" height="48" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5" rx="6"/>
  <text x="408" y="269" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">除算時の</text>
  <text x="408" y="286" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#555">整数オーバーフロー</text>

  <!-- 凡例 -->
  <rect x="30" y="315" width="580" height="22" fill="#FFF8F8" stroke="#E0E0E0" stroke-width="1" rx="4"/>
  <rect x="44" y="322" width="14" height="8" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5" rx="1"/>
  <text x="62" y="330" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#555">単点故障（ORゲート直下・最優先）</text>
  <rect x="220" y="322" width="14" height="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" rx="1"/>
  <text x="238" y="330" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#555">AND複合条件（複数の原因が重なって発生）</text>
  <rect x="440" y="322" width="14" height="8" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5" rx="1"/>
  <text x="458" y="330" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="9" fill="#555">ANDの原因イベント</text>
</svg>
