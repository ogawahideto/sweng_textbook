<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320">
  <defs>
    <style>
      .layer { stroke: #4A90D9; stroke-width: 2; }
      .layer-business { fill: #E3F2FD; }
      .layer-user { fill: #E8F5E9; }
      .layer-function { fill: #FFF3E0; }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #666; }
      .text-example { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; fill: #888; font-style: italic; }
      .arrow { fill: #999; }
      .label { font-family: 'Noto Sans JP', sans-serif; font-size: 10px; fill: #4A90D9; }
    </style>

    <!-- 矢印マーカー -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon class="arrow" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>要求の3つの層</title>
  <desc>ビジネス要求、ユーザー要求、機能要求の階層構造を示す図</desc>

  <!-- 背景 -->
  <rect x="0" y="0" width="500" height="320" fill="#FAFAFA"/>

  <!-- ビジネス要求層（最上位） -->
  <g transform="translate(50, 30)">
    <rect class="layer layer-business" x="0" y="0" width="320" height="70" rx="8"/>
    <text class="text-title" x="160" y="28" text-anchor="middle">ビジネス要求（Why of Why）</text>
    <text class="text-example" x="160" y="50" text-anchor="middle">「売上を20%向上させたい」</text>
    <!-- ラベル -->
    <text class="label" x="340" y="40">← 組織・事業の目標</text>
  </g>

  <!-- ユーザー要求層（中間） -->
  <g transform="translate(50, 120)">
    <rect class="layer layer-user" x="0" y="0" width="320" height="70" rx="8"/>
    <text class="text-title" x="160" y="28" text-anchor="middle">ユーザー要求（Why）</text>
    <text class="text-example" x="160" y="50" text-anchor="middle">「在庫切れで機会損失したくない」</text>
    <!-- ラベル -->
    <text class="label" x="340" y="40">← ユーザーが達成したいこと</text>
  </g>

  <!-- 機能要求層（最下位） -->
  <g transform="translate(50, 210)">
    <rect class="layer layer-function" x="0" y="0" width="320" height="70" rx="8"/>
    <text class="text-title" x="160" y="28" text-anchor="middle">機能要求（What/How）</text>
    <text class="text-example" x="160" y="50" text-anchor="middle">「在庫が10個以下になったら通知」</text>
    <!-- ラベル -->
    <text class="label" x="340" y="40">← 具体的な機能</text>
  </g>

  <!-- 接続線（層の間） -->
  <line x1="210" y1="100" x2="210" y2="120" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="210" y1="190" x2="210" y2="210" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>

</svg>
