<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .box-original { fill: #E8F5E9; stroke: #43A047; stroke-width: 2; }
      .box-mutant { fill: #FFEBEE; stroke: #D32F2F; stroke-width: 2; }
      .box-test { fill: #FFF3E0; stroke: #FB8C00; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#666" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="350" class="bg"/>
  <title>ミューテーションテストの仕組み</title>

  <!-- 元のコード -->
  <rect x="50" y="50" width="120" height="60" rx="5" class="box-original" />
  <text x="110" y="85" class="text-main">元のコード</text>

  <!-- 変異 -->
  <path d="M 110,110 L 110,180" class="arrow" />
  <text x="150" y="150" class="text-sub" text-anchor="start">意図的な「変異」を注入</text>

  <!-- ミュータント -->
  <rect x="50" y="180" width="120" height="60" rx="5" class="box-mutant" />
  <text x="110" y="215" class="text-main">変異体 (Mutant)</text>

  <!-- テスト -->
  <rect x="330" y="115" width="120" height="60" rx="5" class="box-test" />
  <text x="390" y="150" class="text-main">既存のテスト</text>

  <!-- 検証 -->
  <path d="M 170,210 L 330,165" class="arrow" />
  
  <text x="250" y="250" class="text-main" fill="#43A047">テスト失敗 = 殺した (Killed)</text>
  <text x="250" y="270" class="text-sub">変異を検知できた（合格！）</text>
  
  <text x="250" y="300" class="text-main" fill="#D32F2F">テスト成功 = 生き残った (Survived)</text>
  <text x="250" y="320" class="text-sub">変異を見逃した（テストの穴）</text>
</svg>