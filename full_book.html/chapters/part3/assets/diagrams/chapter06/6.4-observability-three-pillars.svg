<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .box { fill: #FFF; stroke-width: 2; rx: 5; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666; text-anchor: middle; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" class="bg"/>
  
  <text x="250" y="40" class="text-main" font-size="18">オブザーバビリティの三本の柱</text>

  <!-- Logs -->
  <rect x="40" y="80" width="130" height="150" class="box" style="stroke: #1E88E5;" />
  <text x="105" y="110" class="text-main">ログ (Logs)</text>
  <text x="105" y="140" class="text-sub">出来事の記録</text>
  <text x="105" y="160" class="text-sub" font-family="monospace">{"msg": "hit"}</text>

  <!-- Metrics -->
  <rect x="185" y="80" width="130" height="150" class="box" style="stroke: #43A047;" />
  <text x="250" y="110" class="text-main">メトリクス</text>
  <text x="250" y="140" class="text-sub">数値の統計</text>
  <text x="250" y="160" class="text-sub">CPU: 45%</text>

  <!-- Traces -->
  <rect x="330" y="80" width="130" height="150" class="box" style="stroke: #FB8C00;" />
  <text x="395" y="110" class="text-main">トレース</text>
  <text x="395" y="140" class="text-sub">処理の連鎖</text>
  <text x="395" y="160" class="text-sub">A -> B -> C</text>

  <text x="250" y="280" class="text-main">システムの「脈動」を感じ取る</text>
</svg>