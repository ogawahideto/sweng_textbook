<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .axis { stroke: #333; stroke-width: 2; }
      .line-debt { stroke: #D32F2F; stroke-width: 3; fill: none; stroke-dasharray: 5; }
      .line-health { stroke: #388E3C; stroke-width: 3; fill: none; }
      .area-refactor { fill: #E3F2FD; opacity: 0.5; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; fill: #333; }
      .text-label { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: bold; }
    </style>
  </defs>

  <rect x="0" y="0" width="500" height="400" class="bg"/>
  <title>技術負債の返済ゲーム</title>

  <!-- 軸 -->
  <line x1="50" y1="350" x2="450" y2="350" class="axis" /> <!-- 時間 -->
  <line x1="50" y1="350" x2="50" y2="50" class="axis" />  <!-- 強さ -->
  <text x="420" y="370" class="text-main">時間 (スプリント)</text>
  <text x="20" y="40" class="text-main">プロジェクトの健全性 / 負債</text>

  <!-- リファクタリング期間（背景色） -->
  <rect x="250" y="50" width="100" height="300" class="area-refactor" />
  <text x="300" y="70" class="text-main" text-anchor="middle">リファクタリング</text>

  <!-- プロジェクトの健全性 (HP) -->
  <path d="M 50,100 C 150,120 200,200 250,250 L 350,100 L 450,120" class="line-health" />
  <text x="400" y="100" class="text-label" fill="#388E3C">開発速度 (HP)</text>

  <!-- 技術負債 (Debt) -->
  <path d="M 50,300 C 150,280 200,200 250,150 L 350,300 L 450,280" class="line-debt" />
  <text x="400" y="320" class="text-label" fill="#D32F2F">技術負債</text>

  <!-- 説明 -->
  <circle cx="250" cy="250" r="5" fill="#D32F2F" />
  <text x="180" y="270" class="text-main">負債の限界！</text>
  
  <circle cx="350" cy="100" r="5" fill="#388E3C" />
  <text x="360" y="90" class="text-main">酸素濃度の上昇</text>

</svg>