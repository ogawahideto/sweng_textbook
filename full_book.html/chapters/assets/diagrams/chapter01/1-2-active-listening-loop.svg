<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      .node-circle { fill: #E3F2FD; stroke: #4A90D9; stroke-width: 3; }
      .arrow-path { fill: none; stroke: #7CB342; stroke-width: 4; marker-end: url(#arrowhead); }
      .text-title { font-family: 'Noto Sans JP', sans-serif; font-size: 18px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-desc { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #555; text-anchor: middle; }
      .center-text { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #666; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#7CB342" points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <title>アクティブ・リスニングの学習ループ</title>

  <!-- 中心 -->
  <text x="250" y="200" class="center-text">信頼の構築</text>

  <!-- ノード1: 聴く (上) -->
  <g transform="translate(250, 80)">
    <circle cx="0" cy="0" r="50" class="node-circle" />
    <text x="0" y="-5" class="text-title">聴く</text>
    <text x="0" y="15" class="text-desc">Listen</text>
    <text x="0" y="30" class="text-desc">(共感)</text>
  </g>

  <!-- ノード2: 仮説 (右下) -->
  <g transform="translate(380, 280)">
    <circle cx="0" cy="0" r="50" class="node-circle" />
    <text x="0" y="-5" class="text-title">仮説</text>
    <text x="0" y="15" class="text-desc">Hypothesize</text>
    <text x="0" y="30" class="text-desc">(理解)</text>
  </g>

  <!-- ノード3: 検証 (左下) -->
  <g transform="translate(120, 280)">
    <circle cx="0" cy="0" r="50" class="node-circle" />
    <text x="0" y="-5" class="text-title">検証</text>
    <text x="0" y="15" class="text-desc">Verify</text>
    <text x="0" y="30" class="text-desc">(質問)</text>
  </g>

  <!-- 矢印 (円環を描く) -->
  <!-- 聴く -> 仮説 -->
  <path d="M 290 110 Q 360 150 380 220" class="arrow-path" />
  
  <!-- 仮説 -> 検証 -->
  <path d="M 330 280 Q 250 340 170 280" class="arrow-path" />

  <!-- 検証 -> 聴く -->
  <path d="M 120 220 Q 140 150 210 110" class="arrow-path" />

</svg>