<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .bubble { fill-opacity: 0.1; stroke-width: 2; stroke-dasharray: 5; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .text-word { font-family: 'serif'; font-size: 16px; fill: #D32F2F; font-weight: bold; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="300" class="bg"/>
  
  <text x="250" y="40" class="text-main" font-size="18">境界づけられたコンテキスト</text>

  <!-- Context A -->
  <ellipse cx="150" cy="150" rx="120" ry="80" class="bubble" style="fill: #E3F2FD; stroke: #1E88E5;" />
  <text x="150" y="100" class="text-main" fill="#1E88E5">受注コンテキスト</text>
  <text x="150" y="150" class="text-word">クエスト</text>
  <text x="150" y="170" class="text-main" font-size="10" font-weight="normal">＝「契約」</text>

  <!-- Context B -->
  <ellipse cx="350" cy="150" rx="120" ry="80" class="bubble" style="fill: #E8F5E9; stroke: #43A047;" />
  <text x="350" y="100" class="text-main" fill="#43A047">戦闘コンテキスト</text>
  <text x="350" y="150" class="text-word">クエスト</text>
  <text x="350" y="170" class="text-main" font-size="10" font-weight="normal">＝「目標」</text>

  <text x="250" y="260" class="text-main">同じ言葉でも、境界によって役割が変わる</text>
</svg>