<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 460" width="300" height="460">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="300" height="460" fill="#FAFAFA" rx="8"/>

  <!-- 開始ノード -->
  <circle cx="150" cy="35" r="12" fill="#333"/>
  <line x1="150" y1="47" x2="150" y2="70" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- クエストを選択 -->
  <rect x="72" y="72" width="156" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="150" y="95" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">クエストを選択</text>
  <line x1="150" y1="108" x2="150" y2="132" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 分岐ひし形 -->
  <polygon points="150,134 190,160 150,186 110,160" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="150" y="165" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#E65100">難易度?</text>

  <!-- 分岐左：難易度:高 -->
  <line x1="110" y1="160" x2="65" y2="160" stroke="#555" stroke-width="2"/>
  <line x1="65" y1="160" x2="65" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="86" y="152" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#666">難易度:高</text>

  <!-- 確認表示 -->
  <rect x="20" y="227" width="90" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="65" y="250" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#333">確認表示</text>

  <!-- 分岐右：難易度:低 -->
  <line x1="190" y1="160" x2="235" y2="160" stroke="#555" stroke-width="2"/>
  <line x1="235" y1="160" x2="235" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="214" y="152" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#666">難易度:低</text>

  <!-- 即開始 -->
  <rect x="190" y="227" width="90" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="235" y="250" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#333">即開始</text>

  <!-- 合流→クエスト実行中 -->
  <line x1="65" y1="263" x2="65" y2="318" stroke="#555" stroke-width="2"/>
  <line x1="65" y1="318" x2="140" y2="318" stroke="#555" stroke-width="2"/>
  <line x1="235" y1="263" x2="235" y2="318" stroke="#555" stroke-width="2"/>
  <line x1="235" y1="318" x2="160" y2="318" stroke="#555" stroke-width="2"/>
  <line x1="150" y1="318" x2="150" y2="338" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- クエスト実行中 -->
  <rect x="68" y="340" width="164" height="36" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="16"/>
  <text x="150" y="363" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#333">クエスト実行中</text>
  <line x1="150" y1="376" x2="150" y2="405" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 終了ノード -->
  <circle cx="150" cy="420" r="13" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="150" cy="420" r="8" fill="#333"/>
</svg>
