<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .cloud { fill: #EEE; }
      .castle { fill: #FFF3E0; stroke: #FB8C00; stroke-width: 2; }
      .text-main { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" class="bg"/>
  
  <!-- Clouds -->
  <circle cx="100" cy="250" r="50" class="cloud" />
  <circle cx="200" cy="280" r="60" class="cloud" />
  <circle cx="350" cy="260" r="50" class="cloud" />
  <rect x="0" y="280" width="500" height="70" class="cloud" />

  <!-- Floating Castle (Serverless) -->
  <rect x="180" y="80" width="140" height="100" rx="5" class="castle" />
  <path d="M 180,80 L 250,20 L 320,80 Z" class="castle" />
  
  <!-- Event Spark -->
  <circle cx="250" cy="220" r="10" fill="#D32F2F" />
  <text x="250" y="245" class="text-main" fill="#D32F2F">イベント発生！</text>
  <path d="M 250,210 L 250,185" stroke="#D32F2F" stroke-width="2" stroke-dasharray="2" />

  <text x="250" y="135" class="text-main">サーバーレス</text>
  <text x="250" y="155" class="text-main" font-size="10" font-weight="normal">必要な時だけ顕現する</text>
</svg>