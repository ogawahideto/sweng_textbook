<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250" width="560" height="250">
  <rect width="560" height="250" fill="#FAFAFA" rx="8"/>
  <line x1="280" y1="8" x2="280" y2="242" stroke="#DDD" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== 左列: ORゲート (center x=140) ===== -->
  <text x="140" y="22" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#E65100">ORゲート</text>

  <!-- トップ事象 -->
  <rect x="68" y="28" width="144" height="28" fill="#FFF3E0" stroke="#F57C00" stroke-width="2" rx="6"/>
  <text x="140" y="47" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#333">トップ事象</text>

  <!-- トップ事象→ゲート -->
  <line x1="140" y1="56" x2="140" y2="82" stroke="#555" stroke-width="1.5"/>

  <!-- ORゲート（円） -->
  <circle cx="140" cy="95" r="14" fill="#E65100" stroke="none"/>
  <text x="140" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">OR</text>

  <!-- ゲート→横バー -->
  <line x1="140" y1="109" x2="140" y2="126" stroke="#555" stroke-width="1.5"/>

  <!-- 横バー -->
  <line x1="76" y1="126" x2="204" y2="126" stroke="#555" stroke-width="1.5"/>

  <!-- 横バー→各入力 -->
  <line x1="84" y1="126" x2="84" y2="142" stroke="#555" stroke-width="1.5"/>
  <line x1="140" y1="126" x2="140" y2="142" stroke="#555" stroke-width="1.5"/>
  <line x1="196" y1="126" x2="196" y2="142" stroke="#555" stroke-width="1.5"/>

  <!-- 入力イベント（円） -->
  <circle cx="84" cy="154" r="12" fill="#FFF8E1" stroke="#F57C00" stroke-width="1.5"/>
  <text x="84" y="159" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#555">A</text>
  <circle cx="140" cy="154" r="12" fill="#FFF8E1" stroke="#F57C00" stroke-width="1.5"/>
  <text x="140" y="159" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#555">B</text>
  <circle cx="196" cy="154" r="12" fill="#FFF8E1" stroke="#F57C00" stroke-width="1.5"/>
  <text x="196" y="159" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#555">C</text>

  <!-- 説明 -->
  <text x="140" y="190" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" font-weight="bold" fill="#E65100">いずれか1つで発火</text>
  <text x="140" y="206" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#777">A・B・Cのどれか一つが発生すると</text>
  <text x="140" y="220" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#777">トップ事象が起きる</text>
  <text x="140" y="238" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" font-weight="bold" fill="#C62828">⚠ 単点故障に注意</text>

  <!-- ===== 右列: ANDゲート (center x=420) ===== -->
  <text x="420" y="22" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="13" font-weight="bold" fill="#1565C0">ANDゲート</text>

  <!-- トップ事象 -->
  <rect x="348" y="28" width="144" height="28" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="6"/>
  <text x="420" y="47" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="11" fill="#333">トップ事象</text>

  <!-- トップ事象→ゲート -->
  <line x1="420" y1="56" x2="420" y2="82" stroke="#555" stroke-width="1.5"/>

  <!-- ANDゲート（平底の矩形で区別） -->
  <rect x="404" y="81" width="32" height="28" fill="#1976D2" stroke="none" rx="4"/>
  <text x="420" y="100" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">AND</text>

  <!-- ゲート→横バー -->
  <line x1="420" y1="109" x2="420" y2="126" stroke="#555" stroke-width="1.5"/>

  <!-- 横バー -->
  <line x1="356" y1="126" x2="484" y2="126" stroke="#555" stroke-width="1.5"/>

  <!-- 横バー→各入力 -->
  <line x1="364" y1="126" x2="364" y2="142" stroke="#555" stroke-width="1.5"/>
  <line x1="420" y1="126" x2="420" y2="142" stroke="#555" stroke-width="1.5"/>
  <line x1="476" y1="126" x2="476" y2="142" stroke="#555" stroke-width="1.5"/>

  <!-- 入力イベント（円） -->
  <circle cx="364" cy="154" r="12" fill="#E8EAF6" stroke="#1976D2" stroke-width="1.5"/>
  <text x="364" y="159" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#555">A</text>
  <circle cx="420" cy="154" r="12" fill="#E8EAF6" stroke="#1976D2" stroke-width="1.5"/>
  <text x="420" y="159" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#555">B</text>
  <circle cx="476" cy="154" r="12" fill="#E8EAF6" stroke="#1976D2" stroke-width="1.5"/>
  <text x="476" y="159" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="12" fill="#555">C</text>

  <!-- 説明 -->
  <text x="420" y="190" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" font-weight="bold" fill="#1565C0">全部揃って発火</text>
  <text x="420" y="206" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#777">A・B・Cがすべて同時に発生して</text>
  <text x="420" y="220" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#777">初めてトップ事象が起きる</text>
  <text x="420" y="238" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Meiryo',sans-serif" font-size="10" fill="#1565C0">複合条件 → 優先度は相対的に低め</text>
</svg>
